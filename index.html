<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Miljontävlingen</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: #f0f2f1; padding: 10px; color: #333; }
    .view { display: none; max-width: 480px; margin: 0 auto; }
    .card { background: white; padding: 18px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); position: relative; }
    .btn { background: #27ae60; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-size: 14px; }
    .timer-banner { background: #e67e22; color: white; text-align: center; padding: 12px; font-weight: bold; border-radius: 8px; margin-bottom: 12px; font-size: 14px; }
    .timer-running { background: #27ae60; }
    .timer-expired { background: #c0392b; }
    .stepper { display: flex; align-items: center; justify-content: space-between; margin-top: 15px; background: #f9f9f9; padding: 8px; border-radius: 30px; }
    .btn-s { width: 44px; height: 44px; border-radius: 50%; border: none; font-size: 20px; font-weight: bold; cursor: pointer; }
    
    .p-val { position: absolute; top: 18px; right: 18px; color: #27ae60; font-weight: 800; font-size: 18px; text-align: right; min-width: 60px; }
    
    .tab-btn { flex: 1; padding: 12px; border: none; background: #34495e; color: white; font-weight: bold; cursor: pointer; font-size: 12px; }
    .tab-btn.active { background: #27ae60; }
    .locked { opacity: 0.4; pointer-events: none; }
    
    /* ENBART PRICKAR ANIMERING */
    .calculating { 
      display: inline-flex; 
      justify-content: flex-end; 
      align-items: center; 
      min-width: 30px; 
    }
    .dots-container { 
      position: relative; 
      display: inline-block; 
      width: 15px; 
      height: 20px;
      text-align: left; 
    }
    .dots:after {
      position: absolute;
      left: 0;
      top: -2px;
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
      font-size: 24px;
      color: #27ae60; /* Prickarna blir gröna som poängen */
    }
    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
      100% { content: ''; }
    }
  </style>
</head>
<body>

<div id="view-loading" class="view" style="display:block; text-align:center; padding-top:100px;">
  <strong>Miljontävlingen</strong><br>Ansluter till servern...
</div>

<div id="view-app" class="view">
  <div id="timer-display" class="timer-banner"></div>
  <div id="header-box"></div>
  
  <div style="display:flex; border-radius:8px; overflow:hidden; margin-bottom:15px;">
    <button id="btn-scorecard" class="tab-btn active" onclick="setTab('scorecard')">Scorecard</button>
    <button id="btn-market" class="tab-btn" onclick="setTab('market')">Börsen</button>
    <button id="btn-leaderboard" class="tab-btn" onclick="setTab('leaderboard')">Leaderboard</button>
  </div>

  <div id="list"></div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbxsNal77lmgadq-4qnmN5KzNGDGddm6gOKy7sFR06ax9SrzSe0PkXF1vOpF7TY5bbDuRw/exec";
  let currentTab = 'scorecard';
  let cachedData = null;
  let timerInterval;
  let requestQueue = [];
  let isProcessingQueue = false;
  let pendingRequestsCount = 0;

  const token = new URLSearchParams(window.location.search).get('token');

  window.onload = () => {
    if (token) {
      fetchData(true);
      setupAutoRefresh();
    } else {
      document.body.innerHTML = "<div class='card'>Ingen länk hittades. Vänligen använd länken från ditt mail.</div>";
    }
  };

  function setupAutoRefresh() {
    setInterval(() => {
      if(!isProcessingQueue && pendingRequestsCount === 0) fetchData(false); 
    }, 30000);
  }

  async function fetchData(showLoading) {
    if (showLoading) switchView('loading');
    try {
      const res = await fetch(`${API_URL}?action=getAppData&token=${token}`);
      cachedData = await res.json();
      startTimer(cachedData.competitionTimes);
      render();
      if (showLoading) switchView('app');
    } catch (e) { console.error("Kunde inte hämta data"); }
  }

  function startTimer(times) {
    if (timerInterval) clearInterval(timerInterval);
    const display = document.getElementById('timer-display');
    const serverOffset = times.now - Date.now();

    timerInterval = setInterval(() => {
      const now = Date.now() + serverOffset;
      const beforeStart = times.start - now;
      const beforeEnd = times.end - now;
      const gracePeriod = (times.end + 600000) - now;
      const listEl = document.getElementById('list');

      if (beforeStart > 0) {
        display.innerHTML = `Tid till start: ${formatTime(beforeStart)}`;
        display.className = "timer-banner";
        listEl.classList.add('locked');
      } else if (beforeEnd > 0) {
        display.innerHTML = `Tävling pågår! Slut om: ${formatTime(beforeEnd)}`;
        display.className = "timer-banner timer-running";
        listEl.classList.remove('locked');
      } else if (gracePeriod > 0) {
        display.innerHTML = `KOMPLETTERA: ${formatTime(gracePeriod)}`;
        display.className = "timer-banner timer-expired";
        listEl.classList.remove('locked');
      } else {
        display.innerHTML = `Tävlingen är helt avslutad.`;
        display.className = "timer-banner timer-expired";
        listEl.classList.add('locked');
        clearInterval(timerInterval);
      }
    }, 1000);
  }

  function formatTime(ms) {
    const s = Math.floor(ms / 1000);
    return `${Math.floor(s/3600)}t ${Math.floor((s%3600)/60)}m ${s%60}s`;
  }

  function setTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + tab).classList.add('active');
    render();
  }

  function updateScore(pId, delta) {
    const countSpan = document.getElementById(`count-${pId}`);
    const ptsSpan = document.getElementById(`pts-${pId}`);
    const totalSpan = document.getElementById(`total-pts`);
    
    let currentVal = parseInt(countSpan.innerText);
    countSpan.innerText = Math.max(0, currentVal + delta);
    
    // NY FIX: Endast prickar, ingen text
    const calcHtml = '<span class="dots-container"><span class="dots"></span></span>';
    
    ptsSpan.innerHTML = calcHtml;
    ptsSpan.classList.add('calculating');
    if(totalSpan) {
      totalSpan.innerHTML = calcHtml;
      totalSpan.classList.add('calculating');
    }

    pendingRequestsCount++;
    requestQueue.push({ pId, delta });
    processQueue();
  }

  async function processQueue() {
    if (isProcessingQueue || requestQueue.length === 0) return;
    isProcessingQueue = true;
    
    while (requestQueue.length > 0) {
      const req = requestQueue.shift();
      try {
        const action = req.delta > 0 ? 'registerSend' : 'removeSend';
        const res = await fetch(`${API_URL}?action=${action}&token=${token}&pId=${req.pId}`);
        cachedData = await res.json();
      } catch (e) { console.error("Anropsfel"); }
      pendingRequestsCount--;
    }
    
    if (pendingRequestsCount === 0) render();
    isProcessingQueue = false;
  }

  function render() {
    if (!cachedData || isProcessingQueue) return; 
    const list = document.getElementById('list');
    list.innerHTML = '';
    const d = cachedData;

    if (currentTab === 'scorecard') {
      let total = 0;
      d.problems.forEach(p => {
        const count = d.userSends[p.id] || 0;
        const shares = (count <= 0 ? 0 : (count >= 10 ? 2.0 : 1.0 + (count - 1) * 0.1)) * d.currentUser.factor;
        const pts = Math.round(shares * (d.problemValues[p.id]?.valuePerShare || 0));
        total += pts;
        list.innerHTML += `<div class="card">
          <span class="p-val" id="pts-${p.id}">${pts.toLocaleString()} p</span>
          <strong>#${p.id} ${p.name}</strong>
          <div class="stepper">
            <button class="btn-s" onclick="updateScore('${p.id}', -1)">−</button>
            <span style="font-size:20px; font-weight:bold;" id="count-${p.id}">${count}</span>
            <button class="btn-s" onclick="updateScore('${p.id}', 1)" style="background:#27ae60; color:white;">+</button>
          </div>
        </div>`;
      });
      document.getElementById('header-box').innerHTML = `<div class="card" style="background:#2c3e50; color:white; border:none;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div><small>HCP: ${d.currentUser.factor.toFixed(2)} (${d.currentUser.length}cm)</small><br><strong>${d.currentUser.name}</strong></div>
          <div style="text-align:right;"><small style="opacity:0.8;">POÄNG</small><br><strong style="font-size:20px; color:#2ecc71;" id="total-pts">${total.toLocaleString()} p</strong></div>
        </div>
      </div>`;
    } else if (currentTab === 'market') {
      d.problems.forEach(p => {
        const val = Math.round(d.problemValues[p.id]?.valuePerShare || 0);
        list.innerHTML += `<div class="card">
          <div style="color:#27ae60; font-weight:900; float:right;">${val.toLocaleString()} p</div>
          <strong>#${p.id} ${p.name}</strong><br><small style="color:#888;">Marknadsvärde per andel</small>
        </div>`;
      });
    } else if (currentTab === 'leaderboard') {
      d.leaderboard.forEach((u, i) => {
        list.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; ${u.name === d.currentUser.name ? 'border:2px solid #27ae60;' : ''}">
          <span>${i+1}. ${u.name}</span><strong>${u.score.toLocaleString()} p</strong>
        </div>`;
      });
    }
  }

  function switchView(id) {
    document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
    document.getElementById('view-' + id).style.display = 'block';
  }
</script>
</body>
</html>
