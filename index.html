<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Miljontävlingen</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: #f0f2f1; padding: 10px; color: #333; }
    .view { display: none; max-width: 480px; margin: 0 auto; }
    .card { background: white; padding: 18px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); position: relative; }
    .btn { background: #27ae60; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-size: 14px; }
    .timer-banner { background: #e67e22; color: white; text-align: center; padding: 12px; font-weight: bold; border-radius: 8px; margin-bottom: 12px; font-size: 14px; }
    .timer-running { background: #27ae60; }
    .timer-expired { background: #c0392b; }
    .stepper { display: flex; align-items: center; justify-content: space-between; margin-top: 15px; background: #f9f9f9; padding: 8px; border-radius: 30px; }
    .btn-s { width: 44px; height: 44px; border-radius: 50%; border: none; font-size: 20px; font-weight: bold; cursor: pointer; }
    .p-val { position: absolute; top: 18px; right: 18px; color: #27ae60; font-weight: 800; font-size: 18px; }
    .calculating { color: #888 !important; font-size: 12px !important; font-style: italic; }
    .tab-btn { flex: 1; padding: 12px; border: none; background: #34495e; color: white; font-weight: bold; cursor: pointer; font-size: 12px; }
    .tab-btn.active { background: #27ae60; }
    .locked { opacity: 0.4; pointer-events: none; }
    input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    .info-text { font-size: 12px; color: #666; margin: 10px 0; line-height: 1.4; }
    .error-msg { color: #e74c3c; background: #fdeaea; padding: 10px; border-radius: 6px; margin-bottom: 10px; display: none; font-size: 14px; text-align: center; font-weight: bold; }
  </style>
</head>
<body>

<div id="view-loading" class="view" style="display:block; text-align:center; padding-top:100px;">
  <strong>Miljontävlingen</strong><br>Ansluter...
</div>

<div id="view-auth" class="view">
  <div class="card">
    <h2 style="margin-top:0;">Registrering</h2>
    <div id="auth-error" class="error-msg">Vänligen fyll i namn och e-post.</div>
    <input type="text" id="name" placeholder="Ditt namn">
    <input type="email" id="email" placeholder="Din e-post">
    <input type="number" id="length" placeholder="Längd i cm (valfritt)">
    <p class="info-text">Vi använder din längd för att räkna ut handikapp. Om ingen längd anges sätts den automatiskt till 180 cm.</p>
    <button class="btn" onclick="handleLogin()">Skicka personlig länk</button>
    <p id="msg" style="display:none; color:#27ae60; text-align:center; font-weight:bold; margin-top:15px;">Kolla din e-post!</p>
  </div>
</div>

<div id="view-app" class="view">
  <div id="timer-display" class="timer-banner">Laddar timer...</div>
  <div id="header-box"></div>
  
  <div style="display:flex; border-radius:8px; overflow:hidden; margin-bottom:15px;">
    <button id="btn-scorecard" class="tab-btn active" onclick="setTab('scorecard')">Scorecard</button>
    <button id="btn-market" class="tab-btn" onclick="setTab('market')">Börsen</button>
    <button id="btn-leaderboard" class="tab-btn" onclick="setTab('leaderboard')">Leaderboard</button>
  </div>

  <div id="list"></div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbxsNal77lmgadq-4qnmN5KzNGDGddm6gOKy7sFR06ax9SrzSe0PkXF1vOpF7TY5bbDuRw/exec";
  let currentTab = 'scorecard';
  let cachedData = null;
  let timerInterval;
  let refreshInterval;
  let isUpdating = false;
  const token = new URLSearchParams(window.location.search).get('token');

  window.onload = () => {
    if (token && token.length > 5) {
      fetchData(true);
      setupAutoRefresh();
    } else {
      switchView('auth');
    }
  };

  function setupAutoRefresh() {
    if (refreshInterval) clearInterval(refreshInterval);
    refreshInterval = setInterval(() => {
      if(!isUpdating) fetchData(false); 
    }, 30000);
  }

  async function fetchData(showLoading) {
    if (showLoading) switchView('loading');
    try {
      const res = await fetch(`${API_URL}?action=getAppData&token=${token}`);
      cachedData = await res.json();
      if (cachedData.error === "AUTH_REQUIRED") return switchView('auth');
      
      startTimer(cachedData.competitionTimes);
      render();
      if (showLoading) switchView('app');
    } catch (e) { console.error("Refresh-fel:", e); }
  }

  function startTimer(times) {
    if (timerInterval) clearInterval(timerInterval);
    const display = document.getElementById('timer-display');
    const serverOffset = times.now - Date.now();

    timerInterval = setInterval(() => {
      const now = Date.now() + serverOffset;
      const beforeStart = times.start - now;
      const beforeEnd = times.end - now;
      const gracePeriod = (times.end + 600000) - now;
      const listEl = document.getElementById('list');

      if (beforeStart > 0) {
        display.innerHTML = `Tid till start: ${formatTime(beforeStart)}`;
        display.className = "timer-banner";
        listEl.classList.add('locked');
      } else if (beforeEnd > 0) {
        display.innerHTML = `Tävling pågår! Tid kvar: ${formatTime(beforeEnd)}`;
        display.className = "timer-banner timer-running";
        listEl.classList.remove('locked');
      } else if (gracePeriod > 0) {
        display.innerHTML = `Tävlingen är avslutad! Ni har ${formatTime(gracePeriod)} kvar för komplettering.`;
        display.className = "timer-banner timer-expired";
        listEl.classList.remove('locked');
      } else {
        display.innerHTML = `Tävlingen är helt avslutad.`;
        display.className = "timer-banner timer-expired";
        listEl.classList.add('locked');
        clearInterval(timerInterval);
      }
    }, 1000);
  }

  function formatTime(ms) {
    const s = Math.floor(ms / 1000);
    return `${Math.floor(s/3600)}t ${Math.floor((s%3600)/60)}m ${s%60}s`;
  }

  function setTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + tab).classList.add('active');
    render();
  }

  async function updateScore(pId, delta) {
    isUpdating = true;
    
    // UI-Tricks: Uppdatera lokalt direkt
    const countSpan = document.getElementById(`count-${pId}`);
    const ptsSpan = document.getElementById(`pts-${pId}`);
    const totalSpan = document.getElementById(`total-pts`);
    
    let currentCount = parseInt(countSpan.innerText);
    let newCount = Math.max(0, currentCount + delta);
    countSpan.innerText = newCount;
    
    // Visa "Beräknar"
    ptsSpan.innerText = "Beräknar...";
    ptsSpan.classList.add('calculating');
    if(totalSpan) totalSpan.innerText = "Beräknar...";

    try {
      const res = await fetch(`${API_URL}?action=${delta>0?'registerSend':'removeSend'}&token=${token}&pId=${pId}`);
      cachedData = await res.json();
      render(); // Rendera om allt med riktig data från servern
    } catch (e) { 
      alert("Kunde inte spara. Prova igen."); 
      fetchData(false);
    }
    isUpdating = false;
  }

  function render() {
    if (!cachedData) return;
    const list = document.getElementById('list');
    list.innerHTML = '';
    const d = cachedData;

    if (currentTab === 'scorecard') {
      let total = 0;
      d.problems.forEach(p => {
        const count = d.userSends[p.id] || 0;
        const shares = (count <= 0 ? 0 : (count >= 10 ? 2.0 : 1.0 + (count - 1) * 0.1)) * d.currentUser.factor;
        const pts = Math.round(shares * (d.problemValues[p.id]?.valuePerShare || 0));
        total += pts;
        list.innerHTML += `<div class="card">
          <span class="p-val" id="pts-${p.id}">${pts.toLocaleString()} p</span>
          <strong>#${p.id} ${p.name}</strong>
          <div class="stepper">
            <button class="btn-s" onclick="updateScore('${p.id}', -1)">−</button>
            <span style="font-size:20px; font-weight:bold;" id="count-${p.id}">${count}</span>
            <button class="btn-s" onclick="updateScore('${p.id}', 1)" style="background:#27ae60; color:white;">+</button>
          </div>
        </div>`;
      });
      document.getElementById('header-box').innerHTML = `<div class="card" style="background:#2c3e50; color:white; border:none;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div><small>HCP: ${d.currentUser.factor.toFixed(2)} (${d.currentUser.length} cm)</small><br><strong>${d.currentUser.name}</strong></div>
          <div style="text-align:right;"><small style="text-transform: uppercase; opacity: 0.8;">Aktuell poäng</small><br><strong style="font-size:20px; color:#2ecc71;" id="total-pts">${total.toLocaleString()} p</strong></div>
        </div>
      </div>`;
    } else if (currentTab === 'market') {
      d.problems.forEach(p => {
        const val = Math.round(d.problemValues[p.id]?.valuePerShare || d.potPerProblem);
        list.innerHTML += `<div class="card">
          <div style="color:#27ae60; font-weight:900; float:right;">${val.toLocaleString()} p</div>
          <strong>#${p.id} ${p.name}</strong><br><small style="color:#888;">Andelar: ${(d.problemValues[p.id]?.totalShares || 0).toFixed(2)}</small>
        </div>`;
      });
    } else if (currentTab === 'leaderboard') {
      d.leaderboard.forEach((u, i) => {
        const isMe = u.name === d.currentUser.name;
        list.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; ${isMe ? 'border:2px solid #27ae60;' : ''}">
          <span>${i+1}. ${u.name}</span><strong>${u.score.toLocaleString()} p</strong>
        </div>`;
      });
    }
  }

  async function handleLogin() {
    const n = document.getElementById('name').value;
    const e = document.getElementById('email').value;
    const l = document.getElementById('length').value;
    if(!n || !e) { document.getElementById('auth-error').style.display = 'block'; return; }
    await fetch(`${API_URL}?action=requestLogin&name=${encodeURIComponent(n)}&email=${encodeURIComponent(e)}&length=${l}`);
    document.getElementById('msg').style.display = 'block';
  }

  function switchView(id) {
    document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
    const el = document.getElementById('view-' + id);
    if(el) el.style.display = 'block';
  }
</script>
</body>
</html>
