<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Miljontävlingen</title>
  <style>
    :root { --primary: #27ae60; --dark: #2c3e50; --bg: #f0f2f1; --accent: #e67e22; --danger: #c0392b; --timer-bg: #3498db; }
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); padding: 10px; color: #333; }
    .view { display: none; max-width: 500px; margin: 0 auto; }
    .card { background: white; padding: 18px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); position: relative; border: 1px solid #eee; }
    .header-card { background: var(--dark); color: white; display: flex; justify-content: space-between; align-items: center; border: none; }
    .timer-banner { background: var(--timer-bg); color: white; text-align: center; padding: 15px; font-weight: bold; border-radius: 8px; margin-bottom: 12px; font-size: 16px; font-family: monospace; }
    .tab-nav { display: flex; border-radius: 8px; overflow: hidden; margin-bottom: 15px; background: #ddd; }
    .tab-btn { flex: 1; padding: 12px; border: none; background: #34495e; color: white; font-weight: bold; cursor: pointer; font-size: 11px; }
    .tab-btn.active { background: var(--primary); }
    .filter-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
    .filter-chip { background: #fff; border: 1px solid #ddd; padding: 6px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; white-space: nowrap; cursor: pointer; }
    .filter-chip.active { background: var(--dark); color: white; }
    .p-score { position: absolute; top: 18px; right: 18px; color: var(--primary); font-weight: 800; font-size: 18px; }
    .stepper { display: flex; align-items: center; justify-content: space-between; margin-top: 15px; background: #f9f9f9; padding: 8px; border-radius: 30px; }
    .btn-s { width: 50px; height: 50px; border-radius: 50%; border: none; font-size: 24px; font-weight: bold; cursor: pointer; background: #ddd; }
    .btn-s.plus { background: var(--primary); color: white; }
    .sync-dots:after { content: ' .'; animation: dots 1s steps(5, end) infinite; font-size: 24px; color: var(--accent); }
    @keyframes dots { 0%, 20% { content: ' .'; } 40% { content: ' . .'; } 60% { content: ' . . .'; } 80%, 100% { content: ''; } }
    .market-val { color: var(--primary); font-weight: bold; margin-left: 15px; text-align: right; min-width: 60px; }
    input, select { width: 100%; padding: 14px; margin: 5px 0 15px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
    .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; }
    #view-scoreboard { max-width: 95vw; }
    .sb-grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
    @media (max-width: 1000px) { .sb-grid { grid-template-columns: 1fr; } }
    .column-split { column-width: 350px; column-gap: 40px; }
    .row { display: flex; justify-content: space-between; padding: 10px 12px; border-bottom: 1px solid #eee; align-items: center; break-inside: avoid; }
    .p-num { min-width: 35px; font-weight: bold; color: #666; }
    .p-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .btn-mini { padding: 6px 10px; font-size: 11px; border-radius: 4px; border: 1px solid #ddd; background: white; cursor: pointer; }
    .btn-accent-mini { padding: 6px 10px; font-size: 11px; border-radius: 4px; background: var(--accent); color: white; border: none; cursor: pointer; }
    .btn-danger-mini { padding: 6px 10px; font-size: 11px; border-radius: 4px; color: var(--danger); background: white; border: 1px solid #fee; cursor: pointer; }
    .mode-badge { display: inline-block; padding: 4px 10px; border-radius: 4px; background: rgba(255,255,255,0.2); font-size: 12px; margin-top: 5px; }
  </style>
</head>
<body>

<div id="view-loading" class="view" style="display:block; text-align:center; padding-top:100px;">
  <strong>Västervik Climbing</strong><br>Ansluter...
</div>

<div id="view-register" class="view">
  <div class="card" style="text-align:center; background:var(--dark); color:white; border:none; margin-top:30px;">
    <h2>Miljontävlingen</h2>
    <div id="reg-mode-display" class="mode-badge">Laddar tävlingsform...</div>
    <p>Anmäl dig eller hämta din länk.</p>
  </div>
  <div class="card" id="reg-form-container">
    <label>Ditt Namn:</label><input type="text" id="reg-name" placeholder="Förnamn Efternamn">
    <label>E-post:</label><input type="email" id="reg-email" placeholder="namn@epost.se">
    <label>Din längd (cm):</label><input type="number" id="reg-height" value="180">
    <label>Välj klass:</label><select id="reg-class"><option value="Allmän">Laddar klasser...</option></select>
    <button class="btn" onclick="registerUser()">SKAPA PROFIL / SKICKA LÄNK</button>
  </div>
  <div id="reg-result" style="display:none;" class="card">
    <p style="color:var(--primary); font-weight:bold;">Klart! Din unika länk är skapad.</p>
    <input type="text" id="reg-token-link" readonly onclick="this.select()">
    <button class="btn" onclick="location.href=document.getElementById('reg-token-link').value">ÖPPNA SCORECARD NU</button>
  </div>
</div>

<div id="view-admin" class="view">
  <div class="card" style="background:var(--danger); color:white; text-align:center;"><h2 style="margin:0">Adminpanel</h2></div>
  <div class="card">
    <h3>Inställningar</h3>
    <div class="grid">
      <div><label>Pott:</label><input type="number" id="adm-pot"></div>
      <div><label>Ref (cm):</label><input type="number" id="adm-ref"></div>
      <div><label>Start:</label><input type="datetime-local" id="adm-start"></div>
      <div><label>Slut:</label><input type="datetime-local" id="adm-end"></div>
    </div>
    <label>Tävlingsläge:</label>
    <select id="adm-mode">
      <option value="open_hcp">Öppen (HCP)</option>
      <option value="open_no_hcp">Öppen (Ingen HCP)</option>
      <option value="class_hcp">Klassvis (HCP)</option>
      <option value="class_no_hcp">Klassvis (Ingen HCP)</option>
    </select>
    <button class="btn" style="background:var(--dark)" onclick="saveSettings()">Spara</button>
  </div>
  <div class="grid">
    <div class="card">
      <h3>Problem</h3>
      <div style="display:flex; gap:5px; margin-bottom:10px;">
        <input type="text" id="new-p-id" placeholder="ID" style="width:50px; margin:0;">
        <input type="text" id="new-p-name" placeholder="Namn" style="flex:1; margin:0;">
        <button class="btn-mini" onclick="addProblem()">+</button>
      </div>
      <div id="admin-problem-list"></div>
    </div>
    <div class="card">
      <h3>Klasser</h3>
      <div style="display:flex; gap:5px; margin-bottom:10px;">
        <input type="text" id="new-class-name" placeholder="Klassnamn" style="flex:1; margin:0;">
        <button class="btn-mini" onclick="addClass()">+</button>
      </div>
      <div id="admin-class-list"></div>
    </div>
  </div>
  <div class="card">
    <h3>Deltagare</h3>
    <div id="admin-user-list"></div>
    <hr>
    <button class="btn" style="background:var(--danger); margin-top:20px;" onclick="resetEverything()">NOLLSTÄLL ALLT (Farligt!)</button>
  </div>
</div>

<div id="view-scoreboard" class="view">
  <div id="sb-timer-box" class="timer-banner"></div>
  <div class="sb-grid">
    <div><div class="card" id="sb-list" style="padding:0"></div></div>
    <div><div class="card" id="sb-market" style="padding:0"></div></div>
  </div>
</div>

<div id="view-app" class="view">
  <div id="timer-display" class="timer-banner"></div>
  <div id="header-box"></div>
  <div class="tab-nav">
    <button id="btn-scorecard" class="tab-btn active" onclick="setTab('scorecard')">SCORECARD</button>
    <button id="btn-leaderboard" class="tab-btn" onclick="setTab('leaderboard')">TOPPLISTA</button>
    <button id="btn-market" class="tab-btn" onclick="setTab('market')">BÖRSEN</button>
  </div>
  <div id="class-filter-container" style="display:none;"><div id="dynamic-filter-bar" class="filter-bar"></div></div>
  <div id="list"></div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbxsNal77lmgadq-4qnmN5KzNGDGddm6gOKy7sFR06ax9SrzSe0PkXF1vOpF7TY5bbDuRw/exec";
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token'), action = urlParams.get('action');
  let adminPwd = "", cachedData = null, currentTab = 'scorecard', selectedClass = "Alla", isCompClosed = false;
  let localSends = {}, updateQueue = {}, scoreboardClassIndex = 0, scoreboardRotationTimer = null;

  // HJÄLPFUNKTIONER
  function switchView(id) { document.querySelectorAll('.view').forEach(v => v.style.display = 'none'); document.getElementById('view-' + id).style.display = 'block'; }
  function toLocalISO(dStr) { if(!dStr) return ""; const d = new Date(dStr); return new Date(d.getTime() - d.getTimezoneOffset()*60000).toISOString().slice(0,16); }
  function getModeText(mode) {
    const modes = { 'open_hcp': 'Öppen (HCP)', 'open_no_hcp': 'Öppen (Ingen HCP)', 'class_hcp': 'Klassvis (HCP)', 'class_no_hcp': 'Klassvis (Ingen HCP)' };
    return modes[mode] || 'Miljontävlingen';
  }

  async function loadData(showLoading) {
    if(showLoading) switchView('loading');
    const p = action === 'scoreboard' ? {action:'scoreboard'} : {action:'getAppData', token:token};
    try {
      const res = await fetch(`${API_URL}?${new URLSearchParams(p)}`);
      cachedData = await res.json();
      if (cachedData.settings && document.getElementById('reg-mode-display')) {
        document.getElementById('reg-mode-display').innerText = getModeText(cachedData.settings.compMode);
      }
      if(cachedData.currentUser && selectedClass === "Alla") selectedClass = cachedData.currentUser.userClass;
      action === 'scoreboard' ? renderScoreboard() : renderApp();
      switchView(action === 'scoreboard' ? 'scoreboard' : 'app');
    } catch (e) { console.error(e); }
  }

  // RENDER-FUNKTIONER (SCOREBOARD / APP)
  function renderApp() {
    const d = cachedData; if(!d || !d.currentUser) return;
    const mode = d.settings.compMode || 'open_hcp';
    d.problems.forEach(p => { if(!updateQueue[p.id]?.length) localSends[p.id] = d.userSends[p.id] || 0; });
    let leaderboard = d.leaderboard.map(u => {
      let score = 0; const factor = mode.includes('no_hcp') ? 1.0 : u.factor;
      d.problems.forEach(p => {
        const s = (u.id === d.currentUser.id) ? (localSends[p.id] || 0) : (u.sends[p.id] || 0);
        const shares = d.problemValues[p.id]?.totalShares || 0;
        if(s > 0 && shares > 0) score += ((s * factor) / shares) * d.settings.totalPot;
      });
      return { ...u, score };
    }).sort((a,b) => b.score - a.score);
    const myScore = leaderboard.find(u => u.id === d.currentUser.id)?.score || 0;
    document.getElementById('header-box').innerHTML = `<div class="card header-card"><div><small>${getModeText(mode)}</small><br><strong>${d.currentUser.name}</strong></div><div style="text-align:right;"><small>TOTALT</small><br><strong style="font-size:24px; color:#2ecc71;">${Math.round(myScore).toLocaleString()}</strong></div></div>`;
    let html = "";
    if(currentTab === 'scorecard') {
      d.problems.forEach(p => {
        const shares = d.problemValues[p.id]?.totalShares || 0;
        const val = shares > 0 ? (localSends[p.id] * d.currentUser.factor / shares) * d.settings.totalPot : 0;
        html += `<div class="card"><strong>#${p.id} ${p.name}</strong><div class="p-score">${updateQueue[p.id]?.length ? '<span class="sync-dots"></span>' : Math.round(val).toLocaleString()+' p'}</div><div class="stepper"><button class="btn-s" onclick="update('${p.id}',-1)">−</button><b style="font-size:28px;">${localSends[p.id] || 0}</b><button class="btn-s plus" onclick="update('${p.id}',1)">+</button></div></div>`;
      });
    } else if(currentTab === 'leaderboard') {
      const classes = [...new Set(d.leaderboard.map(u => u.userClass))].sort();
      document.getElementById('class-filter-container').style.display = 'block';
      document.getElementById('dynamic-filter-bar').innerHTML = `<div class="filter-chip ${selectedClass==='Alla'?'active':''}" onclick="selectedClass='Alla';renderApp()">Alla</div>` + classes.map(c => `<div class="filter-chip ${selectedClass===c?'active':''}" onclick="selectedClass='${c}';renderApp()">${c}</div>`).join('');
      leaderboard.filter(u => selectedClass === "Alla" || u.userClass === selectedClass).forEach((u,i) => {
        html += `<div class="card" style="display:flex; justify-content:space-between; ${u.id===d.currentUser.id?'border:2px solid var(--primary)':''}"><span>${i+1}. ${u.name} <small>(${u.userClass})</small></span><strong>${Math.round(u.score).toLocaleString()}</strong></div>`;
      });
    } else {
      d.problems.forEach(p => { 
        const rawShares = d.problemValues[p.id]?.totalShares || 0;
        const currentPrice = rawShares > 0 ? Math.round(d.settings.totalPot / Math.max(1.0, rawShares)) : d.settings.totalPot;
        html += `<div class="card" style="display:flex; justify-content:space-between;"><span>#${p.id} ${p.name}</span><strong class="market-val">${currentPrice.toLocaleString()}</strong></div>`; 
      });
    }
    document.getElementById('list').innerHTML = html;
    refreshTimer();
  }

  function renderScoreboard() {
    const d = cachedData; if(!d) return;
    const mode = d.settings.compMode || 'open_hcp', isClassMode = mode.indexOf('class_') === 0;
    let leaderboard = d.leaderboard.map(u => {
      let score = 0; const factor = mode.includes('no_hcp') ? 1.0 : u.factor;
      d.problems.forEach(p => {
        const s = u.sends[p.id] || 0, pVal = d.problemValues[p.id];
        const shares = (isClassMode && pVal?.allClasses) ? (pVal.allClasses[u.userClass] || 0) : (pVal?.totalShares || 0);
        if(s > 0 && shares > 0) score += ((s * factor) / shares) * d.settings.totalPot;
      });
      return { ...u, score };
    }).sort((a,b) => b.score - a.score);
    const classes = [...new Set(d.leaderboard.map(u => u.userClass))].sort();
    let currentClass = "Alla", title = "TOPPLISTA (TOTAL)", list = leaderboard;
    if(isClassMode && classes.length > 0) {
      if(scoreboardClassIndex >= classes.length) scoreboardClassIndex = 0;
      currentClass = classes[scoreboardClassIndex]; title = `TOPPLISTA: ${currentClass.toUpperCase()}`;
      list = leaderboard.filter(u => u.userClass === currentClass);
      if(!scoreboardRotationTimer) scoreboardRotationTimer = setInterval(() => { scoreboardClassIndex++; renderScoreboard(); }, 10000);
    }
    document.getElementById('sb-list').innerHTML = `<h3 class="card" style="background:var(--dark);color:white;margin:0;border-radius:12px 12px 0 0; font-size:14px; padding:15px; display:flex; justify-content:space-between;"><div><span>${title}</span><br><small style="font-weight:normal;opacity:0.8;">${getModeText(mode)}</small></div><span>${isClassMode ? (scoreboardClassIndex+1)+'/'+classes.length : ''}</span></h3>` + 
      list.slice(0,25).map((u,i) => `<div class="row"><span class="p-num">${i+1}.</span><span class="p-name">${u.name}</span><strong class="market-val">${Math.round(u.score).toLocaleString()}</strong></div>`).join('');
    document.getElementById('sb-market').innerHTML = `<h3 class="card" style="background:var(--dark);color:white;margin:0;border-radius:12px 12px 0 0; font-size:14px; padding:15px;">BÖRSEN ${isClassMode?'('+currentClass+')':''}</h3><div class="column-split" style="padding:10px;">` + 
      d.problems.map(p => {
        const shares = (isClassMode && d.problemValues[p.id]?.allClasses) ? (d.problemValues[p.id].allClasses[currentClass] || 0) : (d.problemValues[p.id]?.totalShares || 0);
        const currentPrice = shares > 0 ? Math.round(d.settings.totalPot / Math.max(1.0, shares)) : d.settings.totalPot;
        return `<div class="row"><span class="p-num">#${p.id}</span><span class="p-name">${p.name}</span><strong class="market-val">${currentPrice.toLocaleString()}</strong></div>`;
      }).join('') + `</div>`;
    refreshTimer();
  }

  // ADMIN FUNKTIONER
  async function loadAdmin() {
    adminPwd = adminPwd || prompt("Lösenord:");
    try { const res = await fetch(`${API_URL}?action=getAdminFull&pwd=${adminPwd}`); renderAdmin(await res.json()); switchView('admin'); } catch(e){ location.reload(); }
  }
  function renderAdmin(d) {
    document.getElementById('adm-pot').value = d.settings.pot; document.getElementById('adm-ref').value = d.settings.refHeight;
    document.getElementById('adm-start').value = toLocalISO(d.settings.start); document.getElementById('adm-end').value = toLocalISO(d.settings.end);
    document.getElementById('adm-mode').value = d.settings.compMode;
    document.getElementById('admin-problem-list').innerHTML = d.problems.map(p => `<div class="row"><span>#${p.id} ${p.name}</span><button class="btn-danger-mini" onclick="deleteProblem('${p.id}')">Ta bort</button></div>`).join('');
    document.getElementById('admin-class-list').innerHTML = d.classes.map(c => `<div class="row"><span>${c}</span><button class="btn-danger-mini" onclick="deleteClass('${c}')">Ta bort</button></div>`).join('');
    // HÄR ÄR DEN UPPDATERADE RADEN MED EPOST OCH LÄNK-KNAPP
    document.getElementById('admin-user-list').innerHTML = d.users.map(u => `<div class="row"><div style="flex:1;"><strong>${u.name}</strong><br><small>${u.email} (${u.userClass})</small></div><div style="display:flex; gap:4px;"><button class="btn-accent-mini" onclick="resendLink('${u.name}','${u.email}')">Länk</button><button class="btn-mini" onclick="resetUser('${u.id}')">Nolla</button><button class="btn-danger-mini" onclick="deleteUser('${u.id}')">X</button></div></div>`).join('');
  }
  async function saveSettings() {
    const p = { action:'updateSettings', pot:document.getElementById('adm-pot').value, refHeight:document.getElementById('adm-ref').value, start:document.getElementById('adm-start').value, end:document.getElementById('adm-end').value, compMode:document.getElementById('adm-mode').value };
    await fetch(`${API_URL}?pwd=${adminPwd}&${new URLSearchParams(p)}`); loadAdmin();
  }
  async function addProblem() {
    const id = document.getElementById('new-p-id').value, name = document.getElementById('new-p-name').value;
    if(!id || !name) return; await fetch(`${API_URL}?pwd=${adminPwd}&action=addProblem&pId=${id}&name=${encodeURIComponent(name)}`); loadAdmin();
  }
  async function addClass() {
    const name = document.getElementById('new-class-name').value;
    if(!name) return; await fetch(`${API_URL}?pwd=${adminPwd}&action=addClass&className=${encodeURIComponent(name)}`); loadAdmin();
  }
  async function resendLink(name, email) { if(confirm("Skicka länk på nytt till " + name + "?")) { await fetch(`${API_URL}?action=requestLogin&name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}`); alert("Länk skickad!"); } }
  async function deleteProblem(id) { if(confirm("Ta bort problem?")) { await fetch(`${API_URL}?pwd=${adminPwd}&action=deleteProblem&pId=${id}`); loadAdmin(); } }
  async function deleteClass(name) { if(confirm("Ta bort klass?")) { await fetch(`${API_URL}?pwd=${adminPwd}&action=deleteClass&className=${encodeURIComponent(name)}`); loadAdmin(); } }
  async function resetUser(id) { if(confirm("Nolla deltagarens poäng?")) { await fetch(`${API_URL}?pwd=${adminPwd}&action=resetUser&userId=${id}`); loadAdmin(); } }
  async function deleteUser(id) { if(confirm("Radera deltagaren helt?")) { await fetch(`${API_URL}?pwd=${adminPwd}&action=deleteUser&userId=${id}`); loadAdmin(); } }
  async function resetEverything() { if(confirm("ÄR DU SÄKER? Detta raderar ALLA deltagare och ALLA bestigningar!")) { await fetch(`${API_URL}?pwd=${adminPwd}&action=resetEverything`); loadAdmin(); } }

  // ÖVRIG LOGIK (TIMER, TABBAR, UPDATE)
  async function update(pId, delta) {
    if(isCompClosed) return;
    localSends[pId] = Math.max(0, (localSends[pId] || 0) + delta);
    if(!updateQueue[pId]) updateQueue[pId] = [];
    updateQueue[pId].push(delta > 0 ? 'registerSend' : 'removeSend');
    renderApp();
    while(updateQueue[pId].length > 0) {
      const act = updateQueue[pId][0];
      try { const res = await fetch(`${API_URL}?token=${token}&action=${act}&pId=${pId}`); cachedData = await res.json(); updateQueue[pId].shift(); renderApp(); }
      catch (e) { await new Promise(r => setTimeout(r, 2000)); }
    }
  }
  function refreshTimer() {
    if(!cachedData) return;
    const start = new Date(cachedData.settings.startTime).getTime(), end = new Date(cachedData.settings.endTime).getTime(), now = Date.now();
    let label = "Tid till start: ", target = start - now, color = "var(--timer-bg)";
    if(now >= start && now < end) { label = "Tävling pågår: "; target = end - now; color = "var(--primary)"; }
    else if(now >= end) { label = "Tävling avslutad!"; target = 0; color = "var(--danger)"; isCompClosed = true; }
    const h = Math.floor(target/3600000), m = Math.floor((target%3600000)/60000), s = Math.floor((target%60000)/1000);
    document.querySelectorAll('.timer-banner').forEach(el => { el.innerText = label + (target>0 ? `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}` : ""); el.style.background = color; });
  }
  async function registerUser() {
    const n = document.getElementById('reg-name').value, e = document.getElementById('reg-email').value, h = document.getElementById('reg-height').value, c = document.getElementById('reg-class').value;
    if(!n || !e) return;
    try {
      const res = await fetch(`${API_URL}?action=requestLogin&name=${encodeURIComponent(n)}&email=${encodeURIComponent(e)}&length=${h}&userClass=${encodeURIComponent(c)}`);
      const d = await res.json();
      if(d.token) { document.getElementById('reg-form-container').style.display='none'; document.getElementById('reg-result').style.display='block'; document.getElementById('reg-token-link').value = window.location.origin + window.location.pathname + "?token=" + d.token; }
    } catch (err) { alert("Fel vid registrering"); }
  }
  async function loadClassesForRegistration() {
    try { 
      const res = await fetch(`${API_URL}?action=getClasses`); const d = await res.json(); 
      document.getElementById('reg-class').innerHTML = d.classes.map(c => `<option value="${c}">${c}</option>`).join('');
      const resApp = await fetch(`${API_URL}?action=getAppData`); const dApp = await resApp.json();
      if (dApp.settings) document.getElementById('reg-mode-display').innerText = getModeText(dApp.settings.compMode);
    } catch(e){}
  }
  function setTab(t) { currentTab = t; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+t).classList.add('active'); renderApp(); }

  window.onload = () => {
    if(action === 'admin') loadAdmin();
    else if(action === 'scoreboard' || token) { loadData(true); setInterval(() => { if(!document.hidden) loadData(false); }, 30000); setInterval(refreshTimer, 1000); }
    else { switchView('register'); loadClassesForRegistration(); }
  };
</script>
</body>
</html>
