<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Miljontävlingen</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: #f0f2f1; padding: 10px; color: #333; }
    .view { display: none; max-width: 480px; margin: 0 auto; }
    .card { background: white; padding: 18px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); position: relative; }
    .btn { background: #27ae60; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-size: 14px; }
    .timer-banner { background: #e67e22; color: white; text-align: center; padding: 12px; font-weight: bold; border-radius: 8px; margin-bottom: 12px; font-size: 14px; }
    .tab-btn { flex: 1; padding: 12px; border: none; background: #34495e; color: white; font-weight: bold; cursor: pointer; font-size: 12px; }
    .tab-btn.active { background: #27ae60; }
    
    /* Scoreboard Grid Layout */
    #view-scoreboard { max-width: 1100px; }
    .sb-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 800px) { .sb-container { grid-template-columns: 1fr; } }
    
    .sb-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; font-size: 16px; }
    .sb-score { font-weight: bold; color: #27ae60; }
    .sb-title { background: #34495e; color: white; padding: 12px; border-radius: 12px 12px 0 0; margin: 0; font-size: 16px; text-align: center; text-transform: uppercase; letter-spacing: 1px; }

    /* Market styles */
    .market-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; align-items: center; }
    .market-val { color: #27ae60; font-weight: bold; font-family: monospace; font-size: 18px; }

    /* Admin & UI */
    .admin-nav { display: flex; gap: 5px; margin-bottom: 15px; }
    .admin-nav button { flex: 1; padding: 10px; border: none; border-radius: 6px; background: #34495e; color: white; font-size: 11px; }
    .admin-nav button.active { background: #e74c3c; }
    input { width: 100%; padding: 10px; margin: 5px 0 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
    th, td { padding: 8px 4px; border-bottom: 1px solid #eee; text-align: left; }
    .admin-input-small { width: 100% !important; padding: 6px !important; margin: 0 !important; text-align: center; font-size: 14px; }
    .stepper { display: flex; align-items: center; justify-content: space-between; margin-top: 15px; background: #f9f9f9; padding: 8px; border-radius: 30px; }
    .btn-s { width: 44px; height: 44px; border-radius: 50%; border: none; font-size: 20px; font-weight: bold; cursor: pointer; background: #ddd; }
    .btn-s.plus { background: #27ae60; color: white; }
    .p-val { position: absolute; top: 18px; right: 18px; color: #27ae60; font-weight: 800; font-size: 18px; }
    .loading-dots:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
    @keyframes dots { 0%, 20% { content: ' .'; } 40% { content: ' ..'; } 60% { content: ' ...'; } 80%, 100% { content: ''; } }
  </style>
</head>
<body>

<div id="view-loading" class="view" style="display:block; text-align:center; padding-top:100px;">
  <strong style="font-size:20px;">Miljontävlingen</strong><br>
  <span class="loading-dots">Ansluter</span>
</div>

<div id="view-scoreboard" class="view">
    <div class="card" style="background:#2c3e50; color:white; text-align:center; margin-bottom:20px;">
        <h2 style="margin:0">Live Arena</h2>
        <div id="sb-timer" style="font-size:14px; opacity:0.8; margin-top:5px;">Laddar status...</div>
    </div>
    
    <div class="sb-container">
        <div>
            <h3 class="sb-title">Top 10 Klättrare</h3>
            <div class="card" id="sb-list" style="padding:0; border-radius:0 0 12px 12px;"></div>
        </div>
        
        <div>
            <h3 class="sb-title">Börsen (Värde per skick)</h3>
            <div class="card" id="sb-market" style="padding:0; border-radius:0 0 12px 12px;"></div>
        </div>
    </div>
    <p style="text-align:center; font-size:11px; color:#888; margin-top:20px;">Uppdateras automatiskt var 30:e sekund när skärmen är aktiv</p>
</div>

<div id="view-app" class="view">
  <div id="timer-display" class="timer-banner"></div>
  <div id="header-box"></div>
  <div style="display:flex; border-radius:8px; overflow:hidden; margin-bottom:15px;">
    <button id="btn-scorecard" class="tab-btn active" onclick="setTab('scorecard')">Scorecard</button>
    <button id="btn-leaderboard" class="tab-btn" onclick="setTab('leaderboard')">Leaderboard</button>
  </div>
  <div id="list"></div>
</div>

<div id="view-admin" class="view">
  <div class="card" style="background:#2c3e50; color:white; display:flex; justify-content:space-between; align-items:center;">
    <strong>ADMIN PANEL</strong><div id="admin-status">✓</div>
  </div>
  <div class="admin-nav">
    <button id="nav-settings" class="active" onclick="setAdminTab('settings')">INSTÄLLNINGAR</button>
    <button id="nav-problems" onclick="setAdminTab('problems')">PROBLEM</button>
    <button id="nav-users" onclick="setAdminTab('users')">ANVÄNDARE</button>
  </div>
  <div id="tab-settings" class="admin-tab">
    <div class="card">
        <label>Ref-höjd (cm)</label><input type="number" id="adm-ref">
        <label>Poängpott per problem</label><input type="number" id="adm-pot">
        <label>Starttid</label><input type="datetime-local" id="adm-start">
        <label>Sluttid</label><input type="datetime-local" id="adm-end">
        <button class="btn" onclick="saveSettings()" style="background:#2980b9">Spara inställningar</button>
    </div>
    <div class="card" style="border: 2px solid #c0392b; margin-top: 30px;">
        <h3 style="color:#c0392b; margin-top:0;">Nuclear Reset</h3>
        <button class="btn" onclick="nuclearReset()" style="background:#c0392b;">Rensa all data</button>
    </div>
  </div>
  <div id="tab-problems" class="admin-tab" style="display:none">
    <div class="card"><input type="text" id="new-p-id" placeholder="ID"><input type="text" id="new-p-name" placeholder="Namn"><button class="btn" onclick="addProblem()">Lägg till</button></div>
    <div class="card"><table id="table-problems"><tbody></tbody></table></div>
  </div>
  <div id="tab-users" class="admin-tab" style="display:none">
    <div class="card" style="padding:10px 5px;"><table id="table-users"><thead><tr><th>Namn</th><th>cm</th><th>Åtgärd</th></tr></thead><tbody></tbody></table></div>
  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbxsNal77lmgadq-4qnmN5KzNGDGddm6gOKy7sFR06ax9SrzSe0PkXF1vOpF7TY5bbDuRw/exec";
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');
  const action = urlParams.get('action');
  
  let adminPwd = "", cachedData = null, adminData = null;
  let isProcessing = false, refreshInterval = null, isTabActive = true;
  let currentTab = 'scorecard';

  document.addEventListener("visibilitychange", () => {
    isTabActive = !document.hidden;
    if (isTabActive) { action === 'scoreboard' ? fetchScoreboard() : fetchData(false); }
  });

  window.onload = () => {
    if (action === 'admin') {
      adminPwd = prompt("Admin lösenord:");
      if(adminPwd) refreshAdmin(); else document.body.innerHTML = "Nekad.";
    } else if (action === 'scoreboard') {
      fetchScoreboard(); refreshInterval = setInterval(() => { if(isTabActive) fetchScoreboard(); }, 30000);
    } else if (token) {
      fetchData(true); refreshInterval = setInterval(() => { if(isTabActive && !isProcessing) fetchData(false); }, 60000);
    } else {
      document.body.innerHTML = "<div class='card'>Använd din personliga länk.</div>";
    }
  };

  async function fetchScoreboard() {
    try {
      const res = await fetch(`${API_URL}?action=scoreboard`);
      const d = await res.json();
      switchView('scoreboard');
      
      // Render Leaderboard
      const list = document.getElementById('sb-list');
      list.innerHTML = d.leaderboard.slice(0,10).map((u,i) => `
        <div class="sb-row"><span>${i+1}. ${u.name}</span><span class="sb-score">${u.score.toLocaleString()} p</span></div>
      `).join('') || '<div class="sb-row">Inga resultat än</div>';

      // Render Market (Börsen) - Sortera på högst värde
      const market = document.getElementById('sb-market');
      const sortedProblems = d.problems
        .map(p => ({ ...p, val: Math.round(d.problemValues[p.id]?.valuePerShare || 0) }))
        .sort((a,b) => b.val - a.val)
        .slice(0,10);

      market.innerHTML = sortedProblems.map(p => `
        <div class="market-row">
          <span>#${p.id} ${p.name}</span>
          <span class="market-val">${p.val.toLocaleString()}</span>
        </div>
      `).join('') || '<div class="sb-row">Inga problem än</div>';

      updateTimers(d.competitionTimes);
    } catch(e) { console.log("Fel vid hämtning"); }
  }

  async function fetchData(showLoading) {
    if(showLoading) switchView('loading');
    try {
      const res = await fetch(`${API_URL}?action=getAppData&token=${token}`);
      cachedData = await res.json();
      render(); switchView('app');
      updateTimers(cachedData.competitionTimes);
    } catch(e) {}
  }

  function updateTimers(times) {
    const now = Date.now();
    const remain = times.end - now;
    let txt = remain > 0 ? "Tid kvar: " + Math.floor(remain / 3600000) + "t " + Math.floor((remain % 3600000) / 60000) + "m" : "Tävlingen avslutad";
    if(document.getElementById('sb-timer')) document.getElementById('sb-timer').innerText = txt;
    if(document.getElementById('timer-display')) document.getElementById('timer-display').innerText = txt;
    if(remain <= 0 && refreshInterval) { clearInterval(refreshInterval); refreshInterval = null; }
  }

  async function updateScore(pId, delta) {
    if (isProcessing) return;
    isProcessing = true;
    try {
      const res = await fetch(`${API_URL}?action=${delta>0?'registerSend':'removeSend'}&token=${token}&pId=${pId}`);
      cachedData = await res.json();
      render();
    } catch(e) { alert("Fel vid sparning."); }
    isProcessing = false;
  }

  function render() {
    const list = document.getElementById('list'); const d = cachedData;
    list.innerHTML = "";
    if(currentTab === 'scorecard') {
      d.problems.forEach(p => {
        const count = d.userSends[p.id] || 0;
        const shares = (count <= 0 ? 0 : (count >= 10 ? 2.0 : 1.0 + (count - 1) * 0.1)) * d.currentUser.factor;
        const pts = Math.round(shares * (d.problemValues[p.id]?.valuePerShare || 0));
        list.innerHTML += `<div class="card">
            <span class="p-val">${pts.toLocaleString()} p</span>
            <strong>#${p.id} ${p.name}</strong>
            <div class="stepper">
              <button class="btn-s" onclick="updateScore('${p.id}',-1)">−</button>
              <b style="font-size:20px;">${count}</b>
              <button class="btn-s plus" onclick="updateScore('${p.id}',1)">+</button>
            </div>
          </div>`;
      });
      document.getElementById('header-box').innerHTML = `<div class="card" style="background:#2c3e50; color:white; display:flex; justify-content:space-between; align-items:center;">
          <div><small>HCP: ${d.currentUser.factor.toFixed(2)}</small><br><strong>${d.currentUser.name}</strong></div>
          <div style="text-align:right;"><small>DIN POÄNG</small><br><strong style="color:#2ecc71; font-size:20px;">${d.leaderboard.find(u => u.name === d.currentUser.name)?.score.toLocaleString() || 0} p</strong></div>
        </div>`;
    } else {
      d.leaderboard.forEach((u,i) => {
        list.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; ${u.name === d.currentUser.name ? 'border:2px solid #27ae60' : ''}">
            <span>${i+1}. ${u.name}</span><strong>${u.score.toLocaleString()} p</strong>
          </div>`;
      });
    }
  }

  async function refreshAdmin() {
    switchView('loading');
    const res = await fetch(`${API_URL}?action=getAdminFull&pwd=${encodeURIComponent(adminPwd)}`);
    const d = await res.json();
    if(d.error) { alert("Fel!"); return; }
    adminData = d; renderAdmin(); switchView('admin');
  }

  function renderAdmin() {
    const d = adminData;
    document.getElementById('adm-ref').value = d.settings.refHeight;
    document.getElementById('adm-pot').value = d.settings.pot;
    document.getElementById('adm-start').value = d.settings.start;
    document.getElementById('adm-end').value = d.settings.end;
    document.querySelector('#table-problems tbody').innerHTML = d.problems.map(p => `<tr><td>${p.id}</td><td><input value="${p.name}" class="admin-input-small" onchange="updateProblem('${p.id}', this.value)"></td><td><button onclick="deleteProblem('${p.id}')">❌</button></td></tr>`).join('');
    document.querySelector('#table-users tbody').innerHTML = d.users.map(u => `<tr><td>${u.name}</td><td><input type="number" value="${u.length}" class="admin-input-small" onchange="updateUser('${u.id}', this.value)"></td><td><button onclick="resetUser('${u.id}')">Nollställ</button></td></tr>`).join('');
  }

  async function adminAction(params) {
    document.getElementById('admin-status').innerText = "...";
    const res = await fetch(`${API_URL}?pwd=${encodeURIComponent(adminPwd)}&${new URLSearchParams(params)}`);
    adminData = await res.json(); renderAdmin();
    document.getElementById('admin-status').innerText = "✓";
  }

  function saveSettings() { adminAction({ action: 'updateSettings', refHeight: document.getElementById('adm-ref').value, pot: document.getElementById('adm-pot').value, start: document.getElementById('adm-start').value, end: document.getElementById('adm-end').value }); }
  function addProblem() { adminAction({ action: 'addProblem', pId: document.getElementById('new-p-id').value, name: document.getElementById('new-p-name').value }); }
  function updateProblem(id, name) { adminAction({ action: 'updateProblem', pId: id, name: name }); }
  function deleteProblem(id) { if(confirm('Radera?')) adminAction({ action: 'deleteProblem', pId: id }); }
  function updateUser(id, len) { adminAction({ action: 'updateUser', userId: id, length: len }); }
  function resetUser(id) { if(confirm('Nollställ?')) adminAction({ action: 'resetUser', userId: id }); }
  function nuclearReset() { const c = Math.floor(1000+Math.random()*9000); if(prompt(`Skriv ${c}`) == c) adminAction({ action: 'resetEverything' }); }

  function setTab(t) { currentTab = t; document.getElementById('btn-scorecard').classList.toggle('active', t==='scorecard'); document.getElementById('btn-leaderboard').classList.toggle('active', t==='leaderboard'); render(); }
  function setAdminTab(t) { document.querySelectorAll('.admin-tab').forEach(x => x.style.display='none'); document.querySelectorAll('.admin-nav button').forEach(x => x.classList.remove('active')); document.getElementById('tab-'+t).style.display='block'; document.getElementById('nav-'+t).classList.add('active'); }
  function switchView(id) { document.querySelectorAll('.view').forEach(v => v.style.display = 'none'); document.getElementById('view-' + id).style.display = 'block'; }
</script>
</body>
</html>
