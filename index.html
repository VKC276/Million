<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Miljontävlingen</title>

<style>
:root { 
  --primary: #27ae60; --dark: #2c3e50; --bg: #f0f2f1; --accent: #e67e22; --danger: #c0392b;
  --timer-bg: #3498db;
}

body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); padding: 10px; color: #333; }
.view { display: none; max-width: 500px; margin: 0 auto; }

.card { background: white; padding: 18px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); position: relative; border: 1px solid #eee; }

.header-card { background: var(--dark); color: white; display: flex; justify-content: space-between; align-items: center; border: none; }

.timer-banner { background: var(--timer-bg); color: white; text-align: center; padding: 15px; font-weight: bold; border-radius: 8px; margin-bottom: 12px; font-size: 16px; font-family: monospace; transition: background 0.5s; }

.tab-nav { display: flex; border-radius: 8px; overflow: hidden; margin-bottom: 15px; background: #ddd; }

.tab-btn { flex: 1; padding: 12px; border: none; background: #34495e; color: white; font-weight: bold; cursor: pointer; font-size: 11px; }

.tab-btn.active { background: var(--primary); }

.btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; }

.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

.btn-mini { padding: 6px 10px; font-size: 11px; border-radius: 4px; border: 1px solid #ddd; background: white; cursor: pointer; }

.row { display: flex; justify-content: space-between; padding: 10px 12px; border-bottom: 1px solid #eee; align-items: center; overflow: hidden; }
</style>
</head>

<body>

<div id="view-loading" class="view" style="display:block; text-align:center; padding-top:100px;">
<strong>Västervik Climbing</strong><br>Ansluter...
</div>

<div id="view-admin" class="view">

<div class="card" style="background:var(--danger); color:white; text-align:center;">
<h2 style="margin:0">Adminpanel</h2>
</div>

<div class="card">

<h3>Inställningar</h3>

<div class="grid">
<div><label>Pott:</label><input type="number" id="adm-pot"></div>
<div><label>Ref (cm):</label><input type="number" id="adm-ref"></div>
<div><label>Start:</label><input type="datetime-local" id="adm-start"></div>
<div><label>Slut:</label><input type="datetime-local" id="adm-end"></div>
</div>

<button class="btn" style="background:var(--dark)" id="btn-save-settings" onclick="saveSettings()">Spara</button>

</div>

<div class="grid">

<div class="card">

<h3>Problem</h3>

<input type="text" id="new-p-id" placeholder="ID">
<input type="text" id="new-p-name" placeholder="Namn">

<button class="btn" id="btn-add-problem" onclick="addProblem()">Lägg till</button>

<div id="admin-problem-list" style="margin-top:10px"></div>

</div>

<div class="card">

<h3>Deltagare</h3>

<div id="admin-user-list"></div>

<button class="btn" style="background:black; margin-top:20px" id="btn-reset-all" onclick="confirmResetAll()">NOLLSTÄLL ALLT</button>

</div>

</div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxsNal77lmgadq-4qnmN5KzNGDGddm6gOKy7sFR06ax9SrzSe0PkXF1vOpF7TY5bbDuRw/exec";

let adminPwd = "";


/* ===== KNAPPSTATUS HELPERS ===== */

function setButtonState(btn, loadingText) {

if (!btn.dataset.original) {
btn.dataset.original = btn.innerText;
}

btn.innerText = loadingText;
btn.disabled = true;

}

function resetButtonState(btn) {

btn.innerText = btn.dataset.original;
btn.disabled = false;

}


/* ===== ADMIN LOAD ===== */

async function loadAdmin() {

if(!adminPwd) adminPwd = prompt("Lösenord:");

try {

const res = await fetch(`${API_URL}?action=getAdminFull&pwd=${adminPwd}`);
renderAdmin(await res.json());

document.getElementById("view-loading").style.display = "none";
document.getElementById("view-admin").style.display = "block";

} catch(e) {

alert("Fel!");
location.reload();

}

}


/* ===== RENDER ADMIN ===== */

function renderAdmin(data) {

document.getElementById('adm-pot').value = data.settings.pot;
document.getElementById('adm-ref').value = data.settings.refHeight;
document.getElementById('adm-start').value = data.settings.start;
document.getElementById('adm-end').value = data.settings.end;

document.getElementById('admin-problem-list').innerHTML =
data.problems.map(p =>
`<div class="row">
<span>#${p.id} ${p.name}</span>
<button class="btn-mini" onclick="deleteProblem(this,'${p.id}')">Radera</button>
</div>`
).join('');

document.getElementById('admin-user-list').innerHTML =
data.users.map(u =>
`<div class="row">
<span>${u.name}</span>
<button class="btn-mini" onclick="resetUser(this,'${u.id}')">Reset</button>
</div>`
).join('');

}


/* ===== SAVE SETTINGS ===== */

async function saveSettings() {

const btn = document.getElementById("btn-save-settings");
setButtonState(btn,"Sparar...");

const params = {
action:'updateSettings',
pot:document.getElementById('adm-pot').value,
refHeight:document.getElementById('adm-ref').value,
start:document.getElementById('adm-start').value,
end:document.getElementById('adm-end').value
};

try {

const res = await fetch(`${API_URL}?pwd=${adminPwd}&${new URLSearchParams(params)}`);
renderAdmin(await res.json());
alert("Sparat!");

} catch(e) {

alert("Fel!");

}

resetButtonState(btn);

}


/* ===== ADD PROBLEM ===== */

async function addProblem() {

const btn = document.getElementById("btn-add-problem");
setButtonState(btn,"Lägger till...");

const id = document.getElementById("new-p-id").value;
const name = document.getElementById("new-p-name").value;

try {

const res = await fetch(`${API_URL}?pwd=${adminPwd}&action=addProblem&id=${id}&name=${encodeURIComponent(name)}`);
renderAdmin(await res.json());

} catch(e) {

alert("Fel!");

}

resetButtonState(btn);

}


window.onload = () => {

loadAdmin();

};

</script>

</body>
</html>
