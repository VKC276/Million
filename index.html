<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Miljontävlingen</title>
  <style>
    :root { --primary: #27ae60; --dark: #2c3e50; --bg: #f0f2f1; --accent: #e67e22; --danger: #c0392b; --timer-bg: #3498db; }
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); padding: 10px; color: #333; }
    .view { display: none; max-width: 500px; margin: 0 auto; }
    .card { background: white; padding: 18px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); position: relative; border: 1px solid #eee; }
    .header-card { background: var(--dark); color: white; display: flex; justify-content: space-between; align-items: center; border: none; }
    .timer-banner { background: var(--timer-bg); color: white; text-align: center; padding: 15px; font-weight: bold; border-radius: 8px; margin-bottom: 12px; font-size: 16px; font-family: monospace; }
    .tab-nav { display: flex; border-radius: 8px; overflow: hidden; margin-bottom: 15px; background: #ddd; }
    .tab-btn { flex: 1; padding: 12px; border: none; background: #34495e; color: white; font-weight: bold; cursor: pointer; font-size: 11px; }
    .tab-btn.active { background: var(--primary); }
    .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; }
    .row { display: flex; justify-content: space-between; padding: 10px 12px; border-bottom: 1px solid #eee; align-items: center; }
    .btn-mini { padding: 6px 10px; font-size: 11px; border-radius: 4px; border: 1px solid #ddd; background: white; cursor: pointer; }
    
    /* Layout fix för admin */
    #view-admin { max-width: 900px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
    
    .p-score { position: absolute; top: 18px; right: 18px; color: var(--primary); font-weight: 800; }
    .stepper { display: flex; align-items: center; justify-content: space-between; margin-top: 15px; background: #f9f9f9; padding: 8px; border-radius: 30px; }
    .btn-s { width: 45px; height: 45px; border-radius: 50%; border: none; font-size: 20px; font-weight: bold; cursor: pointer; background: #ddd; }
    input, select { width: 100%; padding: 12px; margin: 5px 0 10px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
    .filter-bar { display: flex; gap: 5px; margin-bottom: 10px; overflow-x: auto; }
    .filter-btn { background: white; border: 1px solid #ccc; padding: 5px 10px; border-radius: 15px; font-size: 10px; cursor: pointer; white-space: nowrap; }
    .filter-btn.active { background: var(--dark); color: white; }
  </style>
</head>
<body>

<div id="view-loading" class="view" style="display:block; text-align:center; padding-top:100px;">Ansluter...</div>

<div id="view-admin" class="view">
  <div class="card" style="background:var(--danger); color:white; text-align:center;"><h2 style="margin:0">Adminpanel</h2></div>
  
  <div class="grid">
    <div>
      <div class="card">
        <h3>Inställningar</h3>
        <label>Pott:</label><input type="number" id="adm-pot">
        <label>Ref (cm):</label><input type="number" id="adm-ref">
        <label>Start:</label><input type="datetime-local" id="adm-start">
        <label>Slut:</label><input type="datetime-local" id="adm-end">
        <button class="btn" style="background:var(--dark)" onclick="saveSettings()">Spara Inställningar</button>
      </div>

      <div class="card">
        <h3>Tävlingsklasser</h3>
        <div style="display:flex; gap:5px;">
          <input type="text" id="new-class-name" placeholder="Ny klass..." style="margin:0">
          <button class="btn" style="width:80px; padding:0" onclick="addClass()">Lägg till</button>
        </div>
        <div id="admin-class-list" style="margin-top:10px"></div>
      </div>
    </div>

    <div>
      <div class="card">
        <h3>Problem</h3>
        <div style="display:flex; gap:5px; margin-bottom:10px;">
          <input type="text" id="new-p-id" placeholder="ID" style="width:60px; margin:0">
          <input type="text" id="new-p-name" placeholder="Namn" style="margin:0">
          <button class="btn" style="width:70px; padding:0" onclick="addProblem()">OK</button>
        </div>
        <div id="admin-problem-list"></div>
      </div>

      <div class="card">
        <h3>Deltagare</h3>
        <div id="admin-user-list"></div>
        <button class="btn" style="background:black; margin-top:20px" onclick="if(confirm('Nollställ ALLT?')) resetEverything()">NOLLSTÄLL ALLT</button>
      </div>
    </div>
  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbxsNal77lmgadq-4qnmN5KzNGDGddm6gOKy7sFR06ax9SrzSe0PkXF1vOpF7TY5bbDuRw/exec";
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');
  const action = urlParams.get('action');
  let adminPwd = "", cachedData = null;

  async function loadAdmin() {
    if(!adminPwd) adminPwd = prompt("Lösenord:");
    const res = await fetch(`${API_URL}?action=getAdminFull&pwd=${adminPwd}`);
    const d = await res.json();
    renderAdmin(d);
    switchView('admin');
  }

  function renderAdmin(d) {
    document.getElementById('adm-pot').value = d.settings.pot;
    document.getElementById('adm-ref').value = d.settings.refHeight;
    document.getElementById('adm-start').value = new Date(d.settings.start).toISOString().slice(0,16);
    document.getElementById('adm-end').value = new Date(d.settings.end).toISOString().slice(0,16);
    
    // Klasser
    document.getElementById('admin-class-list').innerHTML = d.classes.map(c => `<div class="row"><span>${c}</span><button class="btn-mini" onclick="deleteClass('${c}')">X</button></div>`).join('');
    
    // Problem (FIXAD: Knappar tillbaka)
    document.getElementById('admin-problem-list').innerHTML = d.problems.map(p => `
      <div class="row">
        <span>#${p.id} ${p.name}</span>
        <button class="btn-mini" onclick="deleteProblem('${p.id}')">Radera</button>
      </div>
    `).join('');
    
    // Deltagare (FIXAD: Knappar tillbaka)
    document.getElementById('admin-user-list').innerHTML = d.users.map(u => `
      <div class="row">
        <span style="font-size:11px">${u.name} (${u.userClass})</span>
        <button class="btn-mini" onclick="resetUser('${u.id}')">Reset</button>
      </div>
    `).join('');
  }

  async function addProblem() {
    const id = document.getElementById('new-p-id').value;
    const name = document.getElementById('new-p-name').value;
    const res = await fetch(`${API_URL}?pwd=${adminPwd}&action=addProblem&pId=${id}&name=${encodeURIComponent(name)}`);
    renderAdmin(await res.json());
  }

  async function deleteProblem(id) {
    if(!confirm("Radera problem?")) return;
    const res = await fetch(`${API_URL}?pwd=${adminPwd}&action=deleteProblem&pId=${id}`);
    renderAdmin(await res.json());
  }

  async function resetUser(id) {
    if(!confirm("Nollställ användarens bestigningar?")) return;
    const res = await fetch(`${API_URL}?pwd=${adminPwd}&action=resetUser&userId=${id}`);
    renderAdmin(await res.json());
  }

  async function addClass() {
    const name = document.getElementById('new-class-name').value;
    const res = await fetch(`${API_URL}?pwd=${adminPwd}&action=addClass&className=${encodeURIComponent(name)}`);
    renderAdmin(await res.json());
    document.getElementById('new-class-name').value = "";
  }

  async function deleteClass(name) {
    const res = await fetch(`${API_URL}?pwd=${adminPwd}&action=deleteClass&className=${encodeURIComponent(name)}`);
    renderAdmin(await res.json());
  }

  async function saveSettings() {
    const p = {
      action: 'updateSettings',
      pot: document.getElementById('adm-pot').value,
      refHeight: document.getElementById('adm-ref').value,
      start: document.getElementById('adm-start').value,
      end: document.getElementById('adm-end').value
    };
    const res = await fetch(`${API_URL}?pwd=${adminPwd}&${new URLSearchParams(p)}`);
    renderAdmin(await res.json());
    alert("Sparat!");
  }

  function switchView(id) { document.querySelectorAll('.view').forEach(v => v.style.display = 'none'); document.getElementById('view-' + id).style.display = 'block'; }

  window.onload = () => {
    if (action === 'admin') loadAdmin();
    // ... resten av din window.onload logik ...
  };
</script>
</body>
</html>
