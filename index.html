<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Miljontävlingen</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: #f0f2f1; padding: 10px; color: #333; }
    .view { display: none; max-width: 480px; margin: 0 auto; }
    .card { background: white; padding: 18px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); position: relative; }
    .btn { background: #27ae60; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-size: 14px; }
    .timer-banner { background: #e67e22; color: white; text-align: center; padding: 12px; font-weight: bold; border-radius: 8px; margin-bottom: 12px; font-size: 14px; }
    .timer-running { background: #27ae60; }
    .timer-expired { background: #c0392b; }
    .stepper { display: flex; align-items: center; justify-content: space-between; margin-top: 15px; background: #f9f9f9; padding: 8px; border-radius: 30px; }
    .btn-s { width: 44px; height: 44px; border-radius: 50%; border: none; font-size: 20px; font-weight: bold; cursor: pointer; }
    .p-val { position: absolute; top: 18px; right: 18px; color: #27ae60; font-weight: 800; font-size: 18px; text-align: right; min-width: 60px; }
    .tab-btn { flex: 1; padding: 12px; border: none; background: #34495e; color: white; font-weight: bold; cursor: pointer; font-size: 12px; }
    .tab-btn.active { background: #27ae60; }
    
    /* Admin UI */
    .admin-nav { display: flex; gap: 5px; margin-bottom: 15px; }
    .admin-nav button { flex: 1; padding: 10px; border: none; border-radius: 6px; background: #34495e; color: white; font-size: 11px; }
    .admin-nav button.active { background: #e74c3c; }
    input { width: 100%; padding: 10px; margin: 5px 0 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    td, th { padding: 8px; border-bottom: 1px solid #eee; text-align: left; }

    /* Animering prickar */
    .dots-container { position: relative; display: inline-block; width: 15px; height: 20px; }
    .dots:after {
      position: absolute; left: 0; top: -2px; content: '';
      animation: dots 1.5s steps(4, end) infinite; font-size: 24px; color: #27ae60;
    }
    @keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } 100% { content: ''; } }
  </style>
</head>
<body>

<div id="view-loading" class="view" style="display:block; text-align:center; padding-top:100px;">
  <strong>Miljontävlingen</strong><br>Ansluter...
</div>

<div id="view-app" class="view">
  <div id="timer-display" class="timer-banner"></div>
  <div id="header-box"></div>
  <div style="display:flex; border-radius:8px; overflow:hidden; margin-bottom:15px;">
    <button id="btn-scorecard" class="tab-btn active" onclick="setTab('scorecard')">Scorecard</button>
    <button id="btn-market" class="tab-btn" onclick="setTab('market')">Börsen</button>
    <button id="btn-leaderboard" class="tab-btn" onclick="setTab('leaderboard')">Leaderboard</button>
  </div>
  <div id="list"></div>
</div>

<div id="view-admin" class="view">
  <div class="card" style="background:#2c3e50; color:white; display:flex; justify-content:space-between; align-items:center;">
    <strong>ADMIN PANEL</strong><div id="admin-status"></div>
  </div>
  <div class="admin-nav">
    <button id="nav-settings" onclick="setAdminTab('settings')">SETTINGS</button>
    <button id="nav-problems" onclick="setAdminTab('problems')">PROBLEMS</button>
    <button id="nav-users" onclick="setAdminTab('users')">USERS</button>
  </div>

  <div id="tab-settings" class="admin-tab">
    <div class="card">
      <label>Ref-höjd (cm)</label><input type="number" id="adm-ref">
      <label>Poängpott</label><input type="number" id="adm-pot">
      <label>Start</label><input type="datetime-local" id="adm-start">
      <label>Slut</label><input type="datetime-local" id="adm-end">
      <button class="btn" onclick="saveSettings()" style="background:#2980b9">Spara inställningar</button>
    </div>
    <div class="card" style="border: 2px solid #c0392b; margin-top: 40px;">
      <h3 style="color:#c0392b; margin-top:0;">Nuclear Reset</h3>
      <p style="font-size:11px;">Raderar alla deltagare och alla resultat permanent.</p>
      <button class="btn" onclick="nuclearReset()" style="background:#c0392b;">Rensa hela tävlingen</button>
    </div>
  </div>

  <div id="tab-problems" class="admin-tab" style="display:none">
    <div class="card">
      <input type="text" id="new-p-id" placeholder="ID (t.ex. 1)">
      <input type="text" id="new-p-name" placeholder="Namn">
      <button class="btn" onclick="addProblem()">Lägg till problem</button>
    </div>
    <div class="card"><table id="table-problems"><tbody></tbody></table></div>
  </div>

  <div id="tab-users" class="admin-tab" style="display:none">
    <div class="card">
      <table id="table-users">
        <thead><tr><th>Användare</th><th>cm</th><th>Åtgärd</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const API_URL = "DITT_APP_SCRIPT_URL_HÄR";
  const token = new URLSearchParams(window.location.search).get('token');
  let cachedData = null, adminData = null, isProcessing = false;

  window.onload = () => {
    if (token === 'admin') refreshAdmin();
    else if (token) { fetchData(true); setInterval(() => { if(!isProcessing) fetchData(false) }, 30000); }
    else document.body.innerHTML = "<div class='card'>Ingen länk hittades.</div>";
  };

  async function fetchData(showLoading) {
    if (showLoading) switchView('loading');
    const res = await fetch(`${API_URL}?action=getAppData&token=${token}`);
    cachedData = await res.json();
    render();
    startTimer(cachedData.competitionTimes);
    if (showLoading) switchView('app');
  }

  // --- ADMIN LOGIK ---
  async function refreshAdmin() {
    switchView('loading');
    const res = await fetch(`${API_URL}?action=getAdminFull&token=admin`);
    adminData = await res.json();
    renderAdmin();
    switchView('admin');
  }

  function renderAdmin() {
    const d = adminData;
    document.getElementById('adm-ref').value = d.settings.refHeight;
    document.getElementById('adm-pot').value = d.settings.pot;
    document.getElementById('adm-start').value = d.settings.start;
    document.getElementById('adm-end').value = d.settings.end;

    document.querySelector('#table-problems tbody').innerHTML = d.problems.map(p => 
      `<tr><td>${p.id}</td><td><input value="${p.name}" onchange="updateProblem('${p.id}', this.value)"></td>
      <td><button onclick="deleteProblem('${p.id}')">❌</button></td></tr>`).join('');

    document.querySelector('#table-users tbody').innerHTML = d.users.map(u => 
      `<tr>
        <td><strong>${u.name}</strong><br><small>${u.email}</small></td>
        <td><input type="number" value="${u.length}" style="width:45px" onchange="updateUser('${u.id}', this.value)"></td>
        <td>
          <button onclick="resetUser('${u.id}')" style="background:#f39c12; color:white; border:none; padding:4px; border-radius:4px; font-size:9px; margin-bottom:4px;">Reset Score</button>
          <button onclick="deleteUser('${u.id}')" style="background:#c0392b; color:white; border:none; padding:4px; border-radius:4px; font-size:9px;">Radera</button>
        </td>
      </tr>`).join('');
  }

  async function adminAction(params) {
    document.getElementById('admin-status').innerHTML = '<span class="dots-container"><span class="dots"></span></span>';
    const res = await fetch(`${API_URL}?token=admin&${new URLSearchParams(params)}`);
    adminData = await res.json();
    renderAdmin();
    document.getElementById('admin-status').innerHTML = '✓';
  }

  function saveSettings() { adminAction({ action: 'updateSettings', refHeight: document.getElementById('adm-ref').value, pot: document.getElementById('adm-pot').value, start: document.getElementById('adm-start').value, end: document.getElementById('adm-end').value }); }
  function addProblem() { const id = document.getElementById('new-p-id').value, name = document.getElementById('new-p-name').value; if(id && name) adminAction({ action: 'addProblem', pId: id, name: name }); }
  function updateProblem(id, name) { adminAction({ action: 'updateProblem', pId: id, name: name }); }
  function deleteProblem(id) { if(confirm('Radera problem?')) adminAction({ action: 'deleteProblem', pId: id }); }
  function updateUser(id, len) { adminAction({ action: 'updateUser', userId: id, length: len }); }
  function resetUser(id) { if(confirm('Nollställ poäng för användaren?')) adminAction({ action: 'resetUser', userId: id }); }
  function deleteUser(id) { if(confirm('Radera användaren helt?')) adminAction({ action: 'deleteUser', userId: id }); }
  
  function nuclearReset() {
    const code = Math.floor(1000 + Math.random() * 9000);
    const input = prompt(`VARNING! Detta raderar ALLT.\nSkriv koden ${code} för att bekräfta:`);
    if (input === code.toString()) adminAction({ action: 'resetEverything' });
  }

  function setAdminTab(tab) {
    document.querySelectorAll('.admin-tab').forEach(t => t.style.display = 'none');
    document.querySelectorAll('.admin-nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).style.display = 'block';
    document.getElementById('nav-' + tab).classList.add('active');
  }

  // --- APP RENDER ---
  function render() {
    if (!cachedData || isProcessing) return;
    const list = document.getElementById('list'); list.innerHTML = '';
    const d = cachedData;
    if (currentTab === 'scorecard') {
      let total = 0;
      d.problems.forEach(p => {
        const count = d.userSends[p.id] || 0;
        const shares = (count <= 0 ? 0 : (count >= 10 ? 2.0 : 1.0 + (count - 1) * 0.1)) * d.currentUser.factor;
        const pts = Math.round(shares * (d.problemValues[p.id]?.valuePerShare || 0));
        total += pts;
        list.innerHTML += `<div class="card"><span class="p-val" id="pts-${p.id}">${pts.toLocaleString()} p</span><strong>#${p.id} ${p.name}</strong><div class="stepper"><button class="btn-s" onclick="updateScore('${p.id}', -1)">−</button><span style="font-size:20px; font-weight:bold;">${count}</span><button class="btn-s" onclick="updateScore('${p.id}', 1)" style="background:#27ae60; color:white;">+</button></div></div>`;
      });
      document.getElementById('header-box').innerHTML = `<div class="card" style="background:#2c3e50; color:white;"><div style="display:flex; justify-content:space-between; align-items:center;"><div><small>HCP: ${d.currentUser.factor.toFixed(2)}</small><br><strong>${d.currentUser.name}</strong></div><div style="text-align:right;"><small>POÄNG</small><br><strong style="font-size:20px; color:#2ecc71;">${total.toLocaleString()} p</strong></div></div></div>`;
    } else if (currentTab === 'market') {
      d.problems.forEach(p => { list.innerHTML += `<div class="card"><div style="color:#27ae60; font-weight:900; float:right;">${Math.round(d.problemValues[p.id]?.valuePerShare || 0).toLocaleString()} p</div><strong>#${p.id} ${p.name}</strong><br><small style="color:#888;">Värde per andel</small></div>`; });
    } else if (currentTab === 'leaderboard') {
      d.leaderboard.forEach((u, i) => { list.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; ${u.name === d.currentUser.name ? 'border:2px solid #27ae60;' : ''}"><span>${i+1}. ${u.name}</span><strong>${u.score.toLocaleString()} p</strong></div>`; });
    }
  }

  async function updateScore(pId, delta) {
    isProcessing = true; document.getElementById(`pts-${pId}`).innerHTML = '<span class="dots-container"><span class="dots"></span></span>';
    const res = await fetch(`${API_URL}?action=${delta > 0 ? 'registerSend' : 'removeSend'}&token=${token}&pId=${pId}`);
    cachedData = await res.json(); isProcessing = false; render();
  }

  function startTimer(times) {
    const display = document.getElementById('timer-display');
    const update = () => {
      const now = Date.now(), remain = times.end - now;
      if (remain > 0) { const s = Math.floor(remain/1000); display.innerHTML = `Slut om: ${Math.floor(s/3600)}t ${Math.floor((s%3600)/60)}m ${s%60}s`; display.className = "timer-banner timer-running"; }
      else { display.innerHTML = "Tävlingen avslutad"; display.className = "timer-banner timer-expired"; }
    };
    setInterval(update, 1000); update();
  }

  let currentTab = 'scorecard';
  function setTab(t) { currentTab = t; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+t).classList.add('active'); render(); }
  function switchView(id) { document.querySelectorAll('.view').forEach(v => v.style.display = 'none'); document.getElementById('view-' + id).style.display = 'block'; }
</script>
</body>
</html>
