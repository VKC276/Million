<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Miljontävlingen v1.0</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: #f0f2f1; padding: 10px; color: #333; }
    .view { display: none; max-width: 480px; margin: 0 auto; }
    .card { background: white; padding: 18px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); position: relative; border: 1px solid #eee; }
    .header-card { background: #2c3e50; color: white; display: flex; justify-content: space-between; align-items: center; border: none; }
    .tab-nav { display: flex; border-radius: 8px; overflow: hidden; margin-bottom: 15px; background: #ddd; }
    .tab-btn { flex: 1; padding: 12px; border: none; background: #34495e; color: white; font-weight: bold; cursor: pointer; font-size: 11px; }
    .tab-btn.active { background: #27ae60; }
    .p-score { position: absolute; top: 18px; right: 18px; color: #27ae60; font-weight: 800; font-size: 18px; text-align: right; }
    .stepper { display: flex; align-items: center; justify-content: space-between; margin-top: 15px; background: #f9f9f9; padding: 8px; border-radius: 30px; }
    .btn-s { width: 50px; height: 50px; border-radius: 50%; border: none; font-size: 24px; font-weight: bold; cursor: pointer; background: #ddd; }
    .btn-s.plus { background: #27ae60; color: white; }
    .market-val { color: #27ae60; font-weight: bold; }
  </style>
</head>
<body>

<div id="loading" style="text-align:center; padding-top:100px; font-weight:bold; color:#7f8c8d;">Laddar din scorecard...</div>

<div id="app" class="view">
  <div id="header"></div>
  <div class="tab-nav">
    <button id="tab-scorecard" class="tab-btn active" onclick="setTab('scorecard')">MITT SCORECARD</button>
    <button id="tab-leaderboard" class="tab-btn" onclick="setTab('leaderboard')">TOPPLISTA</button>
    <button id="tab-market" class="tab-btn" onclick="setTab('market')">BÖRSEN</button>
  </div>
  <div id="list"></div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbxsNal77lmgadq-4qnmN5KzNGDGddm6gOKy7sFR06ax9SrzSe0PkXF1vOpF7TY5bbDuRw/exec";
  const token = new URLSearchParams(window.location.search).get('token');
  let cachedData = null;
  let currentTab = 'scorecard';
  let isProcessing = false;

  // Beräknar din poäng på ett specifikt problem i realtid
  function getProblemScore(pId) {
    const d = cachedData;
    if (!d) return 0;
    const myCount = (d.userSends && d.userSends[pId]) || 0;
    if (myCount === 0) return 0;
    
    const pVal = d.problemValues[pId];
    const pot = d.settings?.totalPot || 1000000;
    
    if (pVal && pVal.totalShares > 0) {
      // Din tyngd = antal sends * handicap
      const myWeighted = myCount * d.currentUser.factor;
      // Din andel av alla viktade sends
      const score = (myWeighted / pVal.totalShares) * pot;
      return isNaN(score) ? 0 : score;
    }
    return pot; // Om du är ensam på problemet
  }

  // Vad är marknadsvärdet (vad får nästa person som klättrar den 1 gång?)
  function getMarketValue(pId) {
    const d = cachedData;
    const pot = d?.settings?.totalPot || 1000000;
    const totalShares = d?.problemValues[pId]?.totalShares || 0;
    // Nästa person (HCP 1.0) lägger till 1.0 i totalen
    return pot / (totalShares + 1.0);
  }

  async function update(pId, delta) {
    if (isProcessing) return;
    isProcessing = true;
    
    // Visuell feedback direkt
    const countEl = document.getElementById(`count-${pId}`);
    if(countEl) countEl.style.opacity = "0.3";

    try {
      const act = delta > 0 ? 'registerSend' : 'removeSend';
      const res = await fetch(`${API_URL}?token=${token}&action=${act}&pId=${pId}`);
      cachedData = await res.json();
    } catch (e) {
      console.error("Update failed:", e);
    } finally {
      isProcessing = false;
      render();
    }
  }

  async function load() {
    if (isProcessing) return;
    try {
      const res = await fetch(`${API_URL}?token=${token}&action=getAppData`);
      cachedData = await res.json();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      render();
    } catch(e) { console.error("Load failed:", e); }
  }

  function render() {
    const d = cachedData;
    if (!d || !d.currentUser) return;

    // Hitta din totalpoäng i leaderboarden
    const myTotal = d.leaderboard.find(u => u.name === d.currentUser.name)?.score || 0;
    
    document.getElementById('header').innerHTML = `
      <div class="card header-card">
        <div><small style="opacity:0.8">HCP: ${d.currentUser.factor.toFixed(2)}x</small><br><strong>${d.currentUser.name}</strong></div>
        <div style="text-align:right;"><small style="opacity:0.8">TOTAL POÄNG</small><br><strong style="font-size:24px; color:#2ecc71;">${Math.round(myTotal).toLocaleString()}</strong></div>
      </div>`;

    let html = "";
    if (currentTab === 'scorecard') {
      d.problems.forEach(p => {
        const count = d.userSends[p.id] || 0;
        const score = getProblemScore(p.id);
        html += `<div class="card">
          <strong style="font-size:18px;">#${p.id} ${p.name}</strong>
          <div class="p-score">${Math.round(score).toLocaleString()} p</div>
          <div class="stepper">
            <button class="btn-s" onclick="update('${p.id}',-1)">−</button>
            <b id="count-${p.id}" style="font-size:28px;">${count}</b>
            <button class="btn-s plus" onclick="update('${p.id}',1)">+</button>
          </div>
        </div>`;
      });
    } else if (currentTab === 'market') {
      d.problems.forEach(p => {
        html += `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
          <span>#${p.id} ${p.name}</span><span class="market-val">${Math.round(getMarketValue(p.id)).toLocaleString()} p</span>
        </div>`;
      });
    } else {
      d.leaderboard.forEach((u,i) => {
        html += `<div class="card" style="display:flex; justify-content:space-between; align-items:center; ${u.name === d.currentUser.name ? 'border:2px solid #27ae60':''}">
          <span>${i+1}. ${u.name}</span><strong style="color:#27ae60">${u.score.toLocaleString()} p</strong>
        </div>`;
      });
    }
    document.getElementById('list').innerHTML = html;
  }

  function setTab(t) { 
    currentTab = t; 
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-'+t).classList.add('active');
    render(); 
  }

  window.onload = load;
  setInterval(load, 30000); // Uppdatera var 30:e sekund
</script>
</body>
</html>
