<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Miljontävlingen</title>
  <style>
    :root { 
      --primary: #27ae60; --dark: #2c3e50; --bg: #f0f2f1; --accent: #e67e22; --danger: #c0392b;
      --timer-bg: #3498db;
    }
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); padding: 10px; color: #333; }
    .view { display: none; max-width: 500px; margin: 0 auto; }
    .card { background: white; padding: 18px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); position: relative; border: 1px solid #eee; }
    .header-card { background: var(--dark); color: white; display: flex; justify-content: space-between; align-items: center; border: none; }
    .timer-banner { background: var(--timer-bg); color: white; text-align: center; padding: 15px; font-weight: bold; border-radius: 8px; margin-bottom: 12px; font-size: 16px; font-family: monospace; transition: background 0.5s; }
    .tab-nav { display: flex; border-radius: 8px; overflow: hidden; margin-bottom: 15px; background: #ddd; }
    .tab-btn { flex: 1; padding: 12px; border: none; background: #34495e; color: white; font-weight: bold; cursor: pointer; font-size: 11px; }
    .tab-btn.active { background: var(--primary); }
    
    .p-score { position: absolute; top: 18px; right: 18px; color: var(--primary); font-weight: 800; font-size: 18px; }
    .stepper { display: flex; align-items: center; justify-content: space-between; margin-top: 15px; background: #f9f9f9; padding: 8px; border-radius: 30px; }
    .btn-s { width: 50px; height: 50px; border-radius: 50%; border: none; font-size: 24px; font-weight: bold; cursor: pointer; background: #ddd; display: flex; align-items: center; justify-content: center; }
    .btn-s.plus { background: var(--primary); color: white; }
    .btn-s:disabled { opacity: 0.2; cursor: not-allowed; }
    
    .sync-dots:after { content: ' .'; animation: dots 1s steps(5, end) infinite; font-size: 24px; color: var(--accent); }
    @keyframes dots { 0%, 20% { content: ' .'; } 40% { content: ' . .'; } 60% { content: ' . . .'; } 80%, 100% { content: ''; } }

    .market-val { color: var(--primary); font-weight: bold; margin-left: 15px; white-space: nowrap; text-align: right; min-width: 60px; }
    label { display: block; margin-top: 10px; font-size: 13px; font-weight: bold; color: #666; }
    input, select { width: 100%; padding: 14px; margin: 5px 0 15px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
    .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; transition: all 0.2s; font-size: 16px; }
    
    #view-admin { max-width: 1000px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .row { display: flex; justify-content: space-between; padding: 10px 12px; border-bottom: 1px solid #eee; align-items: center; }
    .btn-mini { padding: 6px 10px; font-size: 11px; border-radius: 4px; border: 1px solid #ddd; background: white; cursor: pointer; }
  </style>
</head>
<body>

<div id="view-loading" class="view" style="display:block; text-align:center; padding-top:100px;">
  <strong>Västervik Climbing</strong><br>Ansluter...
</div>

<div id="view-register" class="view">
  <div class="card" style="text-align:center; background:var(--dark); color:white; border:none; margin-top:30px;">
    <h2>Miljontävlingen</h2>
    <p>Anmäl dig eller hämta din länk.</p>
  </div>
  <div class="card" id="reg-form-container">
    <label>Ditt Namn:</label><input type="text" id="reg-name" placeholder="Förnamn Efternamn">
    <label>E-post:</label><input type="email" id="reg-email" placeholder="namn@epost.se">
    <label>Din Längd (cm):</label><input type="number" id="reg-height" value="180">
    <label>Klass:</label><select id="reg-class"><option value="Allmän">Hämtar...</option></select>
    <button class="btn" id="btn-do-reg" onclick="registerUser()">SKAPA PROFIL / SKICKA LÄNK</button>
  </div>
  <div id="reg-result" style="display:none;" class="card">
    <p style="color:var(--primary); font-weight:bold;">Klart! Vi har skickat din länk.</p>
    <input type="text" id="reg-token-link" readonly onclick="this.select()">
    <button class="btn" onclick="location.reload()">ÖPPNA SCORECARD NU</button>
  </div>
</div>

<div id="view-admin" class="view">
  <div class="card" style="background:var(--danger); color:white; text-align:center;"><h2 style="margin:0">Adminpanel</h2></div>
  <div class="card">
    <h3>Inställningar</h3>
    <div class="grid">
      <div><label>Pott:</label><input type="number" id="adm-pot"></div>
      <div><label>Ref (cm):</label><input type="number" id="adm-ref"></div>
      <div><label>Start:</label><input type="datetime-local" id="adm-start"></div>
      <div><label>Slut:</label><input type="datetime-local" id="adm-end"></div>
    </div>
    <button class="btn" style="background:var(--dark)" id="btn-save-settings" onclick="saveSettings()">Spara</button>
  </div>
  <div class="grid">
    <div class="card">
      <h3>Problem</h3>
      <input type="text" id="new-p-id" placeholder="ID">
      <input type="text" id="new-p-name" placeholder="Namn">
      <button class="btn" id="btn-add-problem" onclick="addProblem()">Lägg till</button>
      <div id="admin-problem-list" style="margin-top:10px"></div>
    </div>
    <div class="card">
      <h3>Deltagare</h3>
      <div id="admin-user-list"></div>
      <button class="btn" style="background:black; margin-top:20px" id="btn-reset-all" onclick="confirmResetAll()">NOLLSTÄLL ALLT</button>
    </div>
  </div>
</div>

<div id="view-app" class="view">
  <div id="timer-display" class="timer-banner"></div>
  <div id="header-box"></div>
  <div class="tab-nav">
    <button id="btn-scorecard" class="tab-btn active" onclick="setTab('scorecard')">SCORECARD</button>
    <button id="btn-leaderboard" class="tab-btn" onclick="setTab('leaderboard')">TOPPLISTA</button>
    <button id="btn-market" class="tab-btn" onclick="setTab('market')">BÖRSEN</button>
  </div>
  <div id="list"></div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbxsNal77lmgadq-4qnmN5KzNGDGddm6gOKy7sFR06ax9SrzSe0PkXF1vOpF7TY5bbDuRw/exec";
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');
  const action = urlParams.get('action');
  
  let adminPwd = "", cachedData = null, currentTab = 'scorecard';
  let updateQueue = {}, localSends = {};
  let isLocked = false;

  async function loadClasses() {
    try {
      const res = await fetch(`${API_URL}?action=getClasses`);
      const data = await res.json();
      document.getElementById('reg-class').innerHTML = (data.classes || []).map(c => `<option value="${c}">${c}</option>`).join('') + '<option value="Allmän">Allmän</option>';
    } catch(e) { document.getElementById('reg-class').innerHTML = '<option value="Allmän">Allmän</option>'; }
  }

  async function registerUser() {
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const height = document.getElementById('reg-height').value || 180;
    const uClass = document.getElementById('reg-class').value;
    const btn = document.getElementById('btn-do-reg');
    if(!name || !email) return alert("Fyll i namn och e-post!");
    btn.disabled = true; btn.innerText = "Behandlar...";
    try {
      const res = await fetch(`${API_URL}?action=requestLogin&name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&length=${height}&userClass=${encodeURIComponent(uClass)}`);
      const data = await res.json();
      if(data.token) {
        window.history.pushState({}, '', "?token=" + data.token);
        document.getElementById('reg-token-link').value = window.location.href;
        document.getElementById('reg-form-container').style.display = 'none';
        document.getElementById('reg-result').style.display = 'block';
      }
    } catch (e) { alert("Fel!"); btn.disabled = false; btn.innerText = "FÖRSÖK IGEN"; }
  }

  async function loadData(showLoading) {
    if(showLoading) switchView('loading');
    const activeToken = token || new URLSearchParams(window.location.search).get('token');
    try {
      const res = await fetch(`${API_URL}?action=getAppData&token=${activeToken}`);
      cachedData = await res.json();
      renderApp();
      switchView('app');
    } catch (e) { console.error(e); }
  }

  function refreshTimer() {
    if (!cachedData || !cachedData.settings) return;
    const end = new Date(cachedData.settings.endTime).getTime();
    const now = Date.now();
    const diff = end - now;
    isLocked = (now > (end + 600000)); 
    
    const h = Math.floor(Math.abs(diff)/3600000), m = Math.floor((Math.abs(diff)%3600000)/60000), s = Math.floor((Math.abs(diff)%60000)/1000);
    const timeStr = `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    const el = document.getElementById('timer-display');
    
    if (diff > 0) { el.innerText = "KVAR: " + timeStr; el.style.background = "var(--timer-bg)"; }
    else if (!isLocked) { el.innerText = "EFTERREG: " + timeStr; el.style.background = "var(--accent)"; }
    else { el.innerText = "AVSLUTAD"; el.style.background = "var(--danger)"; if(currentTab === 'scorecard') renderApp(); }
  }

  function renderApp() {
    const d = cachedData; if (!d || !d.currentUser) return;
    d.problems.forEach(p => { if (!(updateQueue[p.id]?.length)) localSends[p.id] = d.userSends[p.id] || 0; });
    const myTotal = d.leaderboard.find(u => u.name === d.currentUser.name)?.score || 0;
    
    document.getElementById('header-box').innerHTML = `<div class="card header-card"><div><small>${d.currentUser.userClass || 'Allmän'} | ${d.currentUser.factor.toFixed(2)}x</small><br><strong>${d.currentUser.name}</strong></div><div style="text-align:right;"><small>TOTALT</small><br><strong style="font-size:24px; color:#2ecc71;">${Math.round(myTotal).toLocaleString()}</strong></div></div>`;
    
    let html = "";
    if (currentTab === 'scorecard') {
      d.problems.forEach(p => {
        const val = d.problemValues[p.id];
        const score = val ? Math.round((localSends[p.id] * d.currentUser.factor / val.totalShares) * d.settings.totalPot) : 0;
        const syncing = updateQueue[p.id]?.length > 0;
        html += `<div class="card"><strong>#${p.id} ${p.name}</strong><div class="p-score">${syncing ? '<span class="sync-dots"></span>' : score.toLocaleString() + ' p'}</div><div class="stepper">
          <button class="btn-s" onclick="update('${p.id}',-1)" ${isLocked || syncing ? 'disabled' : ''}>−</button>
          <b style="font-size:28px;">${localSends[p.id] || 0}</b>
          <button class="btn-s plus" onclick="update('${p.id}',1)" ${isLocked || syncing ? 'disabled' : ''}>+</button>
        </div></div>`;
      });
    } else if (currentTab === 'leaderboard') {
      d.leaderboard.forEach((u,i) => { html += `<div class="card" style="display:flex; justify-content:space-between; ${u.name === d.currentUser.name ? 'border:2px solid var(--primary)':''}"><span>${i+1}. ${u.name}</span><strong>${u.score.toLocaleString()} p</strong></div>`; });
    } else {
      d.problems.forEach(p => { html += `<div class="card" style="display:flex; justify-content:space-between;"><span>#${p.id} ${p.name}</span><strong class="market-val">${Math.round(d.settings.totalPot / ((d.problemValues[p.id]?.totalShares || 0) + 1.0)).toLocaleString()} p</strong></div>`; });
    }
    document.getElementById('list').innerHTML = html;
  }

  async function update(pId, delta) {
    if(isLocked) return;
    localSends[pId] = Math.max(0, (localSends[pId] || 0) + delta);
    if (!updateQueue[pId]) updateQueue[pId] = [];
    updateQueue[pId].push(delta > 0 ? 'registerSend' : 'removeSend');
    renderApp();
    processQueue(pId);
  }

  async function processQueue(pId) {
    if (updateQueue[pId].length > 1) return;
    const activeToken = token || new URLSearchParams(window.location.search).get('token');
    while (updateQueue[pId].length > 0) {
      const act = updateQueue[pId][0];
      try {
        const res = await fetch(`${API_URL}?token=${activeToken}&action=${act}&pId=${pId}`);
        cachedData = await res.json();
        updateQueue[pId].shift();
        renderApp();
      } catch (e) { await new Promise(r => setTimeout(r, 2000)); }
    }
  }

  // --- ADMIN (Back-to-basics backend names) ---
  async function loadAdmin() {
    if(!adminPwd) adminPwd = prompt("Lösenord:");
    switchView('loading');
    try {
      const res = await fetch(`${API_URL}?action=getAdminFull&pwd=${adminPwd}`);
      const data = await res.json(); renderAdmin(data); switchView('admin');
    } catch (e) { alert("Fel!"); location.reload(); }
  }

  function renderAdmin(data) {
    document.getElementById('adm-pot').value = data.settings.pot;
    document.getElementById('adm-ref').value = data.settings.refHeight;
    document.getElementById('adm-start').value = new Date(data.settings.start).toISOString().slice(0,16);
    document.getElementById('adm-end').value = new Date(data.settings.end).toISOString().slice(0,16);
    document.getElementById('admin-problem-list').innerHTML = data.problems.map(p => `<div class="row"><span>#${p.id} ${p.name}</span><button class="btn-mini" onclick="deleteProblem(this, '${p.id}')">Radera</button></div>`).join('');
    document.getElementById('admin-user-list').innerHTML = data.users.map(u => `<div class="row"><span>${u.name}</span><button class="btn-mini" onclick="resetUser(this, '${u.id}')">Reset</button></div>`).join('');
  }

  async function saveSettings() {
    const params = { action: 'updateSettings', pot: document.getElementById('adm-pot').value, refHeight: document.getElementById('adm-ref').value, start: document.getElementById('adm-start').value, end: document.getElementById('adm-end').value };
    const res = await fetch(`${API_URL}?pwd=${adminPwd}&${new URLSearchParams(params)}`);
    renderAdmin(await res.json()); alert("Sparat!");
  }

  async function addProblem() {
    const res = await fetch(`${API_URL}?pwd=${adminPwd}&action=addProblem&pId=${document.getElementById('new-p-id').value}&name=${document.getElementById('new-p-name').value}`);
    renderAdmin(await res.json());
  }

  async function deleteProblem(btn, pId) {
    const res = await fetch(`${API_URL}?pwd=${adminPwd}&action=deleteProblem&pId=${pId}`);
    renderAdmin(await res.json());
  }

  async function resetUser(btn, userId) {
    const res = await fetch(`${API_URL}?pwd=${adminPwd}&action=resetUser&userId=${userId}`);
    renderAdmin(await res.json());
  }

  function confirmResetAll() {
    if(confirm("Varning: Detta raderar ALLA sändningar! Är du säker?")) {
      fetch(`${API_URL}?pwd=${adminPwd}&action=resetAll`).then(res => res.json()).then(data => renderAdmin(data));
    }
  }

  function setTab(t) { currentTab = t; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+t).classList.add('active'); renderApp(); }
  function switchView(id) { document.querySelectorAll('.view').forEach(v => v.style.display = 'none'); document.getElementById('view-' + id).style.display = 'block'; }

  window.onload = () => {
    if (action === 'admin') loadAdmin();
    else if (token) { loadData(true); setInterval(refreshTimer, 1000); setInterval(() => { if (!document.hidden) loadData(false); }, 60000); }
    else { loadClasses(); switchView('register'); }
  };
</script>
</body>
</html>
