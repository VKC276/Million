<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Miljontävlingen</title>
  <style>
    :root { 
      --primary: #27ae60; --dark: #2c3e50; --bg: #f0f2f1; --accent: #e67e22; --danger: #c0392b;
      --timer-bg: #3498db;
    }
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); padding: 10px; color: #333; }
    .view { display: none; max-width: 500px; margin: 0 auto; }
    .card { background: white; padding: 18px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); position: relative; border: 1px solid #eee; }
    .header-card { background: var(--dark); color: white; display: flex; justify-content: space-between; align-items: center; border: none; }
    .timer-banner { background: var(--timer-bg); color: white; text-align: center; padding: 12px; font-weight: bold; border-radius: 8px; margin-bottom: 12px; font-size: 14px; font-family: monospace; }
    .tab-nav { display: flex; border-radius: 8px; overflow: hidden; margin-bottom: 15px; background: #ddd; }
    .tab-btn { flex: 1; padding: 12px; border: none; background: #34495e; color: white; font-weight: bold; cursor: pointer; font-size: 11px; }
    .tab-btn.active { background: var(--primary); }
    
    .p-score { position: absolute; top: 18px; right: 18px; color: var(--primary); font-weight: 800; font-size: 18px; }
    .stepper { display: flex; align-items: center; justify-content: space-between; margin-top: 15px; background: #f9f9f9; padding: 8px; border-radius: 30px; }
    .btn-s { width: 50px; height: 50px; border-radius: 50%; border: none; font-size: 24px; font-weight: bold; cursor: pointer; background: #ddd; display: flex; align-items: center; justify-content: center; }
    .btn-s.plus { background: var(--primary); color: white; }
    
    .sync-dots:after { content: ' .'; animation: dots 1s steps(5, end) infinite; font-size: 24px; color: var(--accent); }
    @keyframes dots { 0%, 20% { content: ' .'; } 40% { content: ' . .'; } 60% { content: ' . . .'; } 80%, 100% { content: ''; } }

    .market-val { color: var(--primary); font-weight: bold; margin-left: 15px; white-space: nowrap; text-align: right; min-width: 60px; }
    label { display: block; margin-top: 10px; font-size: 13px; font-weight: bold; color: #666; }
    input, select { width: 100%; padding: 14px; margin: 5px 0 15px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; background: white; }
    .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; }
    
    .row { display: flex; justify-content: space-between; padding: 10px 12px; border-bottom: 1px solid #eee; align-items: center; }
    .badge { font-size: 10px; background: #e0e0e0; padding: 2px 6px; border-radius: 4px; color: #555; margin-left: 8px; text-transform: uppercase; }
    
    .filter-bar { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
    .filter-btn { background: white; border: 1px solid #ccc; padding: 6px 12px; border-radius: 20px; font-size: 12px; white-space: nowrap; cursor: pointer; }
    .filter-btn.active { background: var(--dark); color: white; border-color: var(--dark); }
  </style>
</head>
<body>

<div id="view-loading" class="view" style="display:block; text-align:center; padding-top:100px;">Ansluter...</div>

<div id="view-register" class="view">
  <div class="card" style="text-align:center; background:var(--dark); color:white; border:none; margin-top:30px;">
    <h2>Miljontävlingen</h2>
    <p>Anmäl dig eller hämta din länk.</p>
  </div>
  <div class="card" id="reg-form-container">
    <label>Ditt Namn:</label>
    <input type="text" id="reg-name" placeholder="Förnamn Efternamn">
    <label>E-post:</label>
    <input type="email" id="reg-email" placeholder="namn@epost.se">
    <label>Din Längd (cm):</label>
    <input type="number" id="reg-height" value="180">
    <label>Välj Klass:</label>
    <select id="reg-class"><option value="Allmän">Hämtar klasser...</option></select>
    <p style="font-size:11px; color:#777;">Längd används för att räkna ut handikapp. Om inget värde anges sätts detta automatiskt till 180.</p>
    <button class="btn" id="btn-do-reg" onclick="registerUser()">SKAPA PROFIL / SKICKA LÄNK</button>
  </div>
  <div id="reg-result" style="display:none;" class="card">
    <p>Länk skickad till din e-post!</p>
    <input type="text" id="reg-token-link" readonly onclick="this.select()">
    <button class="btn" onclick="location.reload()">ÖPPNA SCORECARD NU</button>
  </div>
</div>

<div id="view-app" class="view">
  <div id="timer-display" class="timer-banner"></div>
  <div id="header-box"></div>
  <div class="tab-nav">
    <button id="btn-scorecard" class="tab-btn active" onclick="setTab('scorecard')">SCORECARD</button>
    <button id="btn-leaderboard" class="tab-btn" onclick="setTab('leaderboard')">TOPPLISTA</button>
    <button id="btn-market" class="tab-btn" onclick="setTab('market')">BÖRSEN</button>
  </div>
  <div id="filter-container"></div>
  <div id="list"></div>
</div>

<div id="view-admin" class="view">
  <div class="card" style="background:var(--danger); color:white; text-align:center;"><h2>Adminpanel</h2></div>
  <div class="card">
    <h3>Klasser</h3>
    <input type="text" id="adm-new-class" placeholder="Klassnamn">
    <button class="btn" onclick="addClass()">Lägg till Klass</button>
    <div id="adm-class-list" style="margin-top:10px"></div>
  </div>
  <div class="card">
    <h3>Inställningar</h3>
    <label>Pott:</label><input type="number" id="adm-pot">
    <label>Ref (cm):</label><input type="number" id="adm-ref">
    <button class="btn" onclick="saveSettings()">Spara</button>
  </div>
  <div class="card">
    <h3>Problem</h3>
    <input type="text" id="new-p-id" placeholder="ID"><input type="text" id="new-p-name" placeholder="Namn">
    <button class="btn" onclick="addProblem()">Lägg till</button>
    <div id="adm-prob-list"></div>
  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbxsNal77lmgadq-4qnmN5KzNGDGddm6gOKy7sFR06ax9SrzSe0PkXF1vOpF7TY5bbDuRw/exec";
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');
  const action = urlParams.get('action');
  
  let adminPwd = "", cachedData = null, currentTab = 'scorecard', currentFilter = 'ALLA';
  let updateQueue = {}, localSends = {};

  function switchView(id) {
    document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
    const target = document.getElementById('view-' + id);
    if(target) target.style.display = 'block';
  }

  async function registerUser() {
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const height = document.getElementById('reg-height').value || 180;
    const uClass = document.getElementById('reg-class').value;
    if(!name || !email) return alert("Fyll i namn och e-post!");
    document.getElementById('btn-do-reg').disabled = true;
    try {
      const res = await fetch(`${API_URL}?action=requestLogin&name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&length=${height}&userClass=${encodeURIComponent(uClass)}`);
      const data = await res.json();
      if(data.token) {
        window.history.pushState({}, '', "?token=" + data.token);
        document.getElementById('reg-token-link').value = window.location.href;
        document.getElementById('reg-form-container').style.display = 'none';
        document.getElementById('reg-result').style.display = 'block';
      }
    } catch (e) { alert("Ett fel uppstod!"); }
  }

  async function loadClasses() {
    try {
      const res = await fetch(`${API_URL}?action=getClasses`);
      const data = await res.json();
      const sel = document.getElementById('reg-class');
      sel.innerHTML = data.classes.map(c => `<option value="${c}">${c}</option>`).join('') || '<option value="Allmän">Allmän</option>';
    } catch(e) {}
  }

  async function loadData(showLoading) {
    if(showLoading) switchView('loading');
    try {
      const activeToken = token || new URLSearchParams(window.location.search).get('token');
      const res = await fetch(`${API_URL}?action=getAppData&token=${activeToken}`);
      cachedData = await res.json();
      renderApp();
      switchView('app');
    } catch (e) { console.error(e); }
  }

  function renderApp() {
    const d = cachedData; if (!d || !d.currentUser) return;
    d.problems.forEach(p => { if (!(updateQueue[p.id]?.length)) localSends[p.id] = d.userSends[p.id] || 0; });
    const myTotal = d.leaderboard.find(u => u.name === d.currentUser.name)?.score || 0;
    
    document.getElementById('header-box').innerHTML = `<div class="card header-card"><div><small>${d.currentUser.userClass} | HCP ${d.currentUser.factor.toFixed(2)}x</small><br><strong>${d.currentUser.name}</strong></div><div style="text-align:right;"><small>POÄNG</small><br><strong style="font-size:20px; color:#2ecc71;">${Math.round(myTotal).toLocaleString()}</strong></div></div>`;
    
    const filterCont = document.getElementById('filter-container');
    if (currentTab === 'leaderboard') {
      let fHtml = `<div class="filter-bar"><button class="filter-btn ${currentFilter==='ALLA'?'active':''}" onclick="setFilter('ALLA')">ALLA</button>`;
      d.classes.forEach(c => { fHtml += `<button class="filter-btn ${currentFilter===c?'active':''}" onclick="setFilter('${c}')">${c.toUpperCase()}</button>`; });
      filterCont.innerHTML = fHtml + `</div>`;
    } else { filterCont.innerHTML = ''; }

    let html = "";
    if (currentTab === 'scorecard') {
      d.problems.forEach(p => {
        const val = d.problemValues[p.id];
        const score = val ? Math.round((localSends[p.id] * d.currentUser.factor / val.totalShares) * d.settings.totalPot) : 0;
        html += `<div class="card"><strong>#${p.id} ${p.name}</strong><div class="p-score">${updateQueue[p.id]?.length ? '<span class="sync-dots"></span>' : score.toLocaleString() + ' p'}</div><div class="stepper"><button class="btn-s" onclick="update('${p.id}',-1)">−</button><b style="font-size:24px;">${localSends[p.id]}</b><button class="btn-s plus" onclick="update('${p.id}',1)">+</button></div></div>`;
      });
    } else if (currentTab === 'leaderboard') {
      const filtered = currentFilter === 'ALLA' ? d.leaderboard : d.leaderboard.filter(u => u.userClass === currentFilter);
      filtered.forEach((u,i) => {
        html += `<div class="row ${u.name === d.currentUser.name ? 'card' : ''}" style="margin-bottom:5px; border-radius:8px; background:white;"><span>${i+1}. ${u.name} <span class="badge">${u.userClass}</span></span><strong>${u.score.toLocaleString()}</strong></div>`;
      });
    } else {
      d.problems.forEach(p => {
        const val = Math.round(d.settings.totalPot / ((d.problemValues[p.id]?.totalShares || 0) + 1));
        html += `<div class="row"><span>#${p.id} ${p.name}</span><strong class="market-val">${val.toLocaleString()} p</strong></div>`;
      });
    }
    document.getElementById('list').innerHTML = html;
  }

  async function update(pId, delta) {
    localSends[pId] = Math.max(0, localSends[pId] + delta);
    if (!updateQueue[pId]) updateQueue[pId] = [];
    updateQueue[pId].push(delta > 0 ? 'registerSend' : 'removeSend');
    renderApp();
    processQueue(pId);
  }

  async function processQueue(pId) {
    if(updateQueue[pId].length > 1) return;
    const activeToken = token || new URLSearchParams(window.location.search).get('token');
    while(updateQueue[pId].length > 0) {
      const act = updateQueue[pId][0];
      try {
        const res = await fetch(`${API_URL}?token=${activeToken}&action=${act}&pId=${pId}`);
        cachedData = await res.json();
        updateQueue[pId].shift();
        renderApp();
      } catch (e) { await new Promise(r => setTimeout(r, 2000)); }
    }
  }

  async function loadAdmin() {
    if(!adminPwd) adminPwd = prompt("Lösenord:");
    switchView('loading');
    const res = await fetch(`${API_URL}?action=getAdminFull&pwd=${adminPwd}`);
    const d = await res.json();
    document.getElementById('adm-pot').value = d.settings.pot;
    document.getElementById('adm-ref').value = d.settings.refHeight;
    document.getElementById('adm-class-list').innerHTML = d.classes.map(c => `<div class="row">${c} <button onclick="deleteClass('${c}')">Ta bort</button></div>`).join('');
    document.getElementById('adm-prob-list').innerHTML = d.problems.map(p => `<div class="row">#${p.id} ${p.name} <button onclick="deleteProb('${p.id}')">X</button></div>`).join('');
    switchView('admin');
  }

  async function addClass() {
    const name = document.getElementById('adm-new-class').value;
    await fetch(`${API_URL}?action=addClass&pwd=${adminPwd}&className=${encodeURIComponent(name)}`);
    loadAdmin();
  }

  async function deleteClass(name) {
    await fetch(`${API_URL}?action=deleteClass&pwd=${adminPwd}&className=${encodeURIComponent(name)}`);
    loadAdmin();
  }

  function setTab(t) { currentTab = t; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+t).classList.add('active'); renderApp(); }
  function setFilter(f) { currentFilter = f; renderApp(); }

  window.onload = () => {
    if (action === 'admin') loadAdmin();
    else if (token) loadData(true);
    else { loadClasses(); switchView('register'); }
  };
</script>
</body>
</html>
