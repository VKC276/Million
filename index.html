<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Miljontävlingen</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: #f0f2f1; padding: 10px; color: #333; }
    .view { display: none; max-width: 480px; margin: 0 auto; }
    .card { background: white; padding: 18px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); position: relative; transition: opacity 0.2s; }
    .timer-banner { background: #e67e22; color: white; text-align: center; padding: 12px; font-weight: bold; border-radius: 8px; margin-bottom: 12px; font-size: 14px; }
    .tab-btn { flex: 1; padding: 12px; border: none; background: #34495e; color: white; font-weight: bold; cursor: pointer; font-size: 11px; }
    .tab-btn.active { background: #27ae60; }
    
    /* Scoreboard Layout */
    #view-scoreboard { max-width: 1100px; }
    .sb-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 800px) { .sb-container { grid-template-columns: 1fr; } }
    .sb-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; font-size: 16px; }
    .sb-score { font-weight: bold; color: #27ae60; }
    .sb-title { background: #34495e; color: white; padding: 12px; border-radius: 12px 12px 0 0; margin: 0; font-size: 14px; text-align: center; text-transform: uppercase; }
    
    .market-val { color: #27ae60; font-weight: bold; font-family: monospace; font-size: 18px; }
    .stepper { display: flex; align-items: center; justify-content: space-between; margin-top: 15px; background: #f9f9f9; padding: 8px; border-radius: 30px; }
    .btn-s { width: 44px; height: 44px; border-radius: 50%; border: none; font-size: 20px; font-weight: bold; cursor: pointer; background: #ddd; }
    .btn-s.plus { background: #27ae60; color: white; }
    .p-val { position: absolute; top: 18px; right: 18px; color: #27ae60; font-weight: 800; font-size: 18px; text-align: right; }
  </style>
</head>
<body>

<div id="view-loading" class="view" style="display:block; text-align:center; padding-top:100px;">
  <strong>Miljontävlingen</strong><br>Laddar data...
</div>

<div id="view-scoreboard" class="view">
    <div class="card" style="background:#2c3e50; color:white; text-align:center;">
        <h2 style="margin:0">Scoreboard</h2>
        <div id="sb-timer" style="font-size:14px; opacity:0.8; margin-top:5px;">--:--</div>
    </div>
    <div class="sb-container">
        <div><h3 class="sb-title">Top 10 Klättrare</h3><div class="card" id="sb-list" style="padding:0; border-radius:0 0 12px 12px; overflow:hidden;"></div></div>
        <div><h3 class="sb-title">Börsen (Marknadsvärde)</h3><div class="card" id="sb-market-full" style="padding:0; border-radius:0 0 12px 12px; overflow:hidden;"></div></div>
    </div>
</div>

<div id="view-app" class="view">
  <div id="timer-display" class="timer-banner"></div>
  <div id="header-box"></div>
  <div style="display:flex; border-radius:8px; overflow:hidden; margin-bottom:15px;">
    <button id="btn-scorecard" class="tab-btn active" onclick="setTab('scorecard')">Mitt Scorecard</button>
    <button id="btn-leaderboard" class="tab-btn" onclick="setTab('leaderboard')">Leaderboard</button>
    <button id="btn-market" class="tab-btn" onclick="setTab('market')">Börsen</button>
  </div>
  <div id="list"></div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbxsNal77lmgadq-4qnmN5KzNGDGddm6gOKy7sFR06ax9SrzSe0PkXF1vOpF7TY5bbDuRw/exec";
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');
  const action = urlParams.get('action');
  
  let cachedData = null;
  let isProcessing = false;
  let isTabActive = true;
  let currentTab = 'scorecard';
  let requestQueue = [];

  function switchView(id) {
    document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
    const el = document.getElementById('view-' + id);
    if(el) el.style.display = 'block';
  }

  function getSetting(key) {
    if (!cachedData || !cachedData.settings) return null;
    return cachedData.settings[key] || cachedData.settings[key.toUpperCase()] || null;
  }

  function getShares(count, factor) {
    if (!count || count <= 0) return 0;
    const base = count >= 10 ? 2.0 : 1.0 + (count - 1) * 0.1;
    return base * (factor || 1);
  }

  function getCurrentUserScore(pId) {
    if (!cachedData || !cachedData.currentUser) return 0;
    const d = cachedData;
    const pot = parseInt(getSetting('TOTAL_POT')) || 1000000;
    const myCount = (d.userSends && d.userSends[pId]) || 0;
    
    if (myCount <= 0) return 0;

    const pData = (d.problemValues && d.problemValues[pId]);
    if (!pData || !pData.totalShares || pData.totalShares <= 0) return pot;

    const myShares = getShares(myCount, d.currentUser.factor);
    const score = (myShares / pData.totalShares) * pot;
    
    return isNaN(score) ? 0 : score;
  }

  function getMarketValue(pId) {
    if (!cachedData) return 0;
    const d = cachedData;
    const pot = parseInt(getSetting('TOTAL_POT')) || 1000000;
    const pData = (d.problemValues && d.problemValues[pId]);
    
    if (!pData || !pData.totalShares || pData.totalShares <= 0) return pot;
    
    const nextTotalShares = pData.totalShares + 1.0; 
    const val = (1.0 / nextTotalShares) * pot;
    
    return isNaN(val) ? pot : val;
  }

  async function call(params) {
    const res = await fetch(`${API_URL}?${new URLSearchParams(params)}`);
    return res.json();
  }

  async function fetchScoreboard() {
    try {
      cachedData = await call({ action: 'scoreboard' });
      renderScoreboard();
      switchView('scoreboard');
    } catch(e) { console.error("SB Error:", e); }
  }

  async function fetchData(load) {
    if(!token || isProcessing) return;
    if(load) switchView('loading');
    try {
      cachedData = await call({ action: 'getAppData', token: token });
      render();
      switchView('app');
    } catch(e) { console.error("App Data Error:", e); }
  }

  function renderScoreboard() {
    const d = cachedData;
    if(!d) return;
    
    document.getElementById('sb-list').innerHTML = (d.leaderboard || []).slice(0,10).map((u,i) => `
      <div class="sb-row"><span>${i+1}. ${u.name}</span><span class="sb-score">${Math.round(u.score || 0).toLocaleString()} p</span></div>
    `).join('') || '<div class="sb-row">Väntar på resultat...</div>';

    const sorted = [...(d.problems || [])].map(p => {
      return {...p, val: Math.round(getMarketValue(p.id))};
    }).sort((a,b) => b.val - a.val);

    document.getElementById('sb-market-full').innerHTML = sorted.slice(0,10).map(p => `
      <div class="market-row"><span>#${p.id} ${p.name}</span><span class="market-val">${p.val.toLocaleString()}</span></div>
    `).join('') || '<div class="market-row">Inga problem hittades</div>';
    updateTimers();
  }

  function render() {
    const d = cachedData;
    if(!d || !d.currentUser) return;
    const list = document.getElementById('list');
    list.innerHTML = "";

    const userScoreTotal = (d.leaderboard || []).find(u => u.name === d.currentUser.name)?.score || 0;

    document.getElementById('header-box').innerHTML = `
      <div class="card" style="background:#2c3e50; color:white; display:flex; justify-content:space-between; align-items:center;">
        <div><small>HCP: ${(d.currentUser.factor || 1).toFixed(2)}x</small><br><strong>${d.currentUser.name}</strong></div>
        <div style="text-align:right;"><small>DIN TOTAL</small><br><strong style="color:#2ecc71; font-size:20px;">${Math.round(userScoreTotal).toLocaleString()}</strong></div>
      </div>`;

    if(currentTab === 'scorecard') {
      (d.problems || []).forEach(p => {
        const myCount = (d.userSends && d.userSends[p.id]) || 0;
        const myProbScore = getCurrentUserScore(p.id);

        list.innerHTML += `
          <div class="card" id="card-${p.id}">
            <div class="p-val" id="pts-${p.id}">${Math.round(myProbScore).toLocaleString()} p</div>
            <strong>#${p.id} ${p.name}</strong>
            <div class="stepper">
              <button class="btn-s" onclick="updateScore('${p.id}',-1)">−</button>
              <b style="font-size:24px;" id="count-${p.id}">${myCount}</b>
              <button class="btn-s plus" onclick="updateScore('${p.id}',1)">+</button>
            </div>
          </div>`;
      });
    } else if (currentTab === 'market') {
      [...(d.problems || [])].map(p => ({...p, mVal: getMarketValue(p.id)}))
      .sort((a,b) => b.mVal - a.mVal).forEach(p => {
        list.innerHTML += `
          <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
            <span>#${p.id} ${p.name}</span>
            <div style="text-align:right;"><span class="market-val">${Math.round(p.mVal).toLocaleString()}</span><br><small style="opacity:0.5">Nästa klättrare får</small></div>
          </div>`;
      });
    } else {
      (d.leaderboard || []).forEach((u,i) => {
        list.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; ${u.name === d.currentUser.name ? 'border:2px solid #27ae60' : ''}"><span>${i+1}. ${u.name}</span><strong>${Math.round(u.score || 0).toLocaleString()} p</strong></div>`;
      });
    }
    updateTimers();
  }

  async function updateScore(pId, delta) {
    const countEl = document.getElementById(`count-${pId}`);
    const ptsEl = document.getElementById(`pts-${pId}`);
    const cardEl = document.getElementById(`card-${pId}`);
    
    let currentCount = parseInt(countEl.innerText) || 0;
    let newCount = Math.max(0, currentCount + delta);
    if(currentCount === newCount) return;

    countEl.innerText = newCount;
    ptsEl.innerText = "...";
    cardEl.style.opacity = "0.6";

    requestQueue.push({ pId, action: delta > 0 ? 'registerSend' : 'removeSend' });
    processQueue();
  }

  async function processQueue() {
    if (isProcessing || requestQueue.length === 0) return;
    isProcessing = true;
    const task = requestQueue.shift();
    try {
      const res = await call({ action: task.action, token: token, pId: task.pId });
      cachedData = res;
      render();
    } catch(e) {
      console.error("Save error:", e);
      fetchData(false);
    } finally {
      isProcessing = false;
      processQueue();
    }
  }

  function updateTimers() {
    const endStr = getSetting('END_TIME');
    if(!endStr) return;
    const end = new Date(endStr).getTime();
    if(isNaN(end)) return;
    const remain = end - Date.now();
    const txt = remain > 0 ? "Kvar: " + Math.floor(remain/3600000) + "t " + Math.floor((remain%3600000)/60000) + "m" : "Avslutad";
    if(document.getElementById('sb-timer')) document.getElementById('sb-timer').innerText = txt;
    if(document.getElementById('timer-display')) document.getElementById('timer-display').innerText = txt;
  }

  window.onload = () => {
    if (action === 'scoreboard') { 
      fetchScoreboard(); setInterval(() => isTabActive && fetchScoreboard(), 30000); 
    } else if (token) { 
      fetchData(true); setInterval(() => isTabActive && !isProcessing && requestQueue.length === 0 && fetchData(false), 60000); 
    } else { 
      switchView('loading');
      document.getElementById('view-loading').innerHTML = "Vänligen använd din personliga länk.";
    }
  };

  function setTab(t) { 
    currentTab = t; 
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'btn-'+t)); 
    render(); 
  }
  document.addEventListener("visibilitychange", () => isTabActive = !document.hidden);
</script>
</body>
</html>
