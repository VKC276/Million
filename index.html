<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Miljontävlingen</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: #f0f2f1; padding: 10px; color: #333; }
    .view { display: none; max-width: 480px; margin: 0 auto; }
    .card { background: white; padding: 18px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); position: relative; }
    .btn { background: #27ae60; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-size: 14px; }
    .timer-banner { background: #e67e22; color: white; text-align: center; padding: 12px; font-weight: bold; border-radius: 8px; margin-bottom: 12px; font-size: 14px; }
    .tab-btn { flex: 1; padding: 12px; border: none; background: #34495e; color: white; font-weight: bold; cursor: pointer; font-size: 11px; }
    .tab-btn.active { background: #27ae60; }
    #view-scoreboard { max-width: 1100px; }
    .sb-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 800px) { .sb-container { grid-template-columns: 1fr; } }
    .sb-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; font-size: 16px; }
    .sb-score { font-weight: bold; color: #27ae60; }
    .sb-title { background: #34495e; color: white; padding: 12px; border-radius: 12px 12px 0 0; margin: 0; font-size: 14px; text-align: center; text-transform: uppercase; }
    .market-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; align-items: center; }
    .market-val { color: #27ae60; font-weight: bold; font-family: monospace; font-size: 18px; }
    .stepper { display: flex; align-items: center; justify-content: space-between; margin-top: 15px; background: #f9f9f9; padding: 8px; border-radius: 30px; }
    .btn-s { width: 44px; height: 44px; border-radius: 50%; border: none; font-size: 20px; font-weight: bold; cursor: pointer; background: #ddd; }
    .btn-s.plus { background: #27ae60; color: white; }
    .p-val { position: absolute; top: 18px; right: 18px; color: #27ae60; font-weight: 800; font-size: 18px; }
  </style>
</head>
<body>

<div id="view-loading" class="view" style="display:block; text-align:center; padding-top:100px;">
  <strong>Miljontävlingen</strong><br>Ansluter...
</div>

<div id="view-scoreboard" class="view">
    <div class="card" style="background:#2c3e50; color:white; text-align:center;">
        <h2 style="margin:0">Scoreboard</h2>
        <div id="sb-timer" style="font-size:14px; opacity:0.8; margin-top:5px;">Laddar status...</div>
    </div>
    <div class="sb-container">
        <div><h3 class="sb-title">Top 10 Klättrare</h3><div class="card" id="sb-list" style="padding:0; border-radius:0 0 12px 12px;"></div></div>
        <div><h3 class="sb-title">Börsen (Värde nu)</h3><div class="card" id="sb-market-full" style="padding:0; border-radius:0 0 12px 12px;"></div></div>
    </div>
</div>

<div id="view-app" class="view">
  <div id="timer-display" class="timer-banner"></div>
  <div id="header-box"></div>
  <div style="display:flex; border-radius:8px; overflow:hidden; margin-bottom:15px;">
    <button id="btn-scorecard" class="tab-btn active" onclick="setTab('scorecard')">Scorecard</button>
    <button id="btn-leaderboard" class="tab-btn" onclick="setTab('leaderboard')">Leaderboard</button>
    <button id="btn-market" class="tab-btn" onclick="setTab('market')">Börsen</button>
  </div>
  <div id="list"></div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbxsNal77lmgadq-4qnmN5KzNGDGddm6gOKy7sFR06ax9SrzSe0PkXF1vOpF7TY5bbDuRw/exec";
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');
  const action = urlParams.get('action');
  
  let cachedData = null, isProcessing = false, isTabActive = true, currentTab = 'scorecard';

  function switchView(id) {
    document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
    const el = document.getElementById('view-' + id);
    if(el) el.style.display = 'block';
  }

  // Hjälpfunktion för att säkert hämta potten
  function getPot(d) {
    if (!d || !d.settings) return 1000000;
    return d.settings.TOTAL_POT || d.settings.pot || 1000000;
  }

  async function call(params) {
    const res = await fetch(`${API_URL}?${new URLSearchParams(params)}`);
    if (!res.ok) throw new Error('API Fail');
    return res.json();
  }

  async function fetchScoreboard() {
    try {
      cachedData = await call({ action: 'scoreboard' });
      renderScoreboard();
      switchView('scoreboard');
    } catch(e) { console.error("Scoreboard error:", e); }
  }

  async function fetchData(load) {
    if(!token) return;
    if(load) switchView('loading');
    try {
      cachedData = await call({ action: 'getAppData', token: token });
      render();
      switchView('app');
    } catch(e) { console.error("Data error:", e); }
  }

  function renderScoreboard() {
    const d = cachedData;
    if(!d) return;
    const pot = getPot(d);
    
    document.getElementById('sb-list').innerHTML = (d.leaderboard || []).slice(0,10).map((u,i) => `
      <div class="sb-row"><span>${i+1}. ${u.name}</span><span class="sb-score">${(u.score || 0).toLocaleString()} p</span></div>
    `).join('') || '<div class="sb-row">Inga resultat än</div>';

    const sorted = [...(d.problems || [])].map(p => {
      const pData = d.problemValues ? d.problemValues[p.id] : null;
      const v = (pData && pData.totalShares > 0) ? pData.valuePerShare : pot;
      return {...p, val: Math.round(v)};
    }).sort((a,b) => b.val - a.val);

    document.getElementById('sb-market-full').innerHTML = sorted.slice(0,10).map(p => `
      <div class="market-row"><span>#${p.id} ${p.name}</span><span class="market-val">${p.val.toLocaleString()}</span></div>
    `).join('');
    if(d.competitionTimes) updateTimers(d.competitionTimes);
  }

  function render() {
    const d = cachedData;
    if(!d || !d.currentUser) return;
    const pot = getPot(d);
    const list = document.getElementById('list');
    list.innerHTML = "";

    const userScore = (d.leaderboard || []).find(u => u.name === d.currentUser.name)?.score || 0;

    document.getElementById('header-box').innerHTML = `
      <div class="card" style="background:#2c3e50; color:white; display:flex; justify-content:space-between; align-items:center;">
        <div><small>HCP: ${(d.currentUser.factor || 1).toFixed(2)}x</small><br><strong>${d.currentUser.name}</strong></div>
        <div style="text-align:right;"><small>POÄNG</small><br><strong style="color:#2ecc71; font-size:20px;">${userScore.toLocaleString()}</strong></div>
      </div>`;

    if(currentTab === 'scorecard') {
      (d.problems || []).forEach(p => {
        const count = (d.userSends && d.userSends[p.id]) || 0;
        const pData = d.problemValues ? d.problemValues[p.id] : null;
        const vps = (pData && pData.totalShares > 0) ? pData.valuePerShare : pot;
        const shares = (count <= 0 ? 0 : (count >= 10 ? 2.0 : 1.0 + (count - 1) * 0.1)) * (d.currentUser.factor || 1);
        const pts = Math.round(shares * vps);
        list.innerHTML += `<div class="card"><span class="p-val">${pts.toLocaleString()} p</span><strong>#${p.id} ${p.name}</strong>
          <div class="stepper"><button class="btn-s" onclick="updateScore('${p.id}',-1)">−</button><b style="font-size:20px;">${count}</b><button class="btn-s plus" onclick="updateScore('${p.id}',1)">+</button></div></div>`;
      });
    } else if(currentTab === 'leaderboard') {
      (d.leaderboard || []).forEach((u,i) => {
        list.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; ${u.name === d.currentUser.name ? 'border:2px solid #27ae60' : ''}"><span>${i+1}. ${u.name}</span><strong>${(u.score || 0).toLocaleString()} p</strong></div>`;
      });
    } else if(currentTab === 'market') {
      [...(d.problems || [])].map(p => {
        const pData = d.problemValues ? d.problemValues[p.id] : null;
        const v = (pData && pData.totalShares > 0) ? pData.valuePerShare : pot;
        return {...p, val: Math.round(v)};
      }).sort((a,b) => b.val - a.val).forEach(p => {
        list.innerHTML += `<div class="card" style="display:flex; justify-content:space-between;"><span>#${p.id} ${p.name}</span><strong class="market-val">${p.val.toLocaleString()}</strong></div>`;
      });
    }
    if(d.competitionTimes) updateTimers(d.competitionTimes);
  }

  async function updateScore(pId, delta) {
    if(isProcessing) return; isProcessing = true;
    try {
      cachedData = await call({ action: delta > 0 ? 'registerSend' : 'removeSend', token: token, pId: pId });
      render();
    } catch(e) { alert("Kunde inte spara"); }
    isProcessing = false;
  }

  function updateTimers(t) {
    const remain = t.end - Date.now();
    const txt = remain > 0 ? "Kvar: " + Math.floor(remain/3600000) + "t " + Math.floor((remain%3600000)/60000) + "m" : "Avslutad";
    if(document.getElementById('sb-timer')) document.getElementById('sb-timer').innerText = txt;
    if(document.getElementById('timer-display')) document.getElementById('timer-display').innerText = txt;
  }

  window.onload = () => {
    if (action === 'scoreboard') { 
      fetchScoreboard(); 
      setInterval(() => isTabActive && fetchScoreboard(), 30000); 
    } else if (token) { 
      fetchData(true); 
      setInterval(() => isTabActive && !isProcessing && fetchData(false), 60000); 
    } else { 
      switchView('loading'); 
      document.getElementById('view-loading').innerHTML = "Vänligen använd din personliga länk."; 
    }
  };

  function setTab(t) { 
    currentTab = t; 
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'btn-'+t)); 
    render(); 
  }
  document.addEventListener("visibilitychange", () => isTabActive = !document.hidden);
</script>
</body>
</html>
