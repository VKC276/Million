<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Miljontävlingen</title>
  <style>
    :root { 
      --primary: #27ae60; --dark: #2c3e50; --bg: #f0f2f1; --accent: #e67e22; --danger: #c0392b;
      --timer-bg: #3498db;
    }
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); padding: 10px; color: #333; }
    .view { display: none; max-width: 500px; margin: 0 auto; }
    .card { background: white; padding: 18px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); position: relative; border: 1px solid #eee; }
    .header-card { background: var(--dark); color: white; display: flex; justify-content: space-between; align-items: center; border: none; }
    .timer-banner { background: var(--timer-bg); color: white; text-align: center; padding: 15px; font-weight: bold; border-radius: 8px; margin-bottom: 12px; font-size: 16px; font-family: monospace; transition: background 0.5s; }
    .tab-nav { display: flex; border-radius: 8px; overflow: hidden; margin-bottom: 15px; background: #ddd; }
    .tab-btn { flex: 1; padding: 12px; border: none; background: #34495e; color: white; font-weight: bold; cursor: pointer; font-size: 11px; }
    .tab-btn.active { background: var(--primary); }
    
    .p-score { position: absolute; top: 18px; right: 18px; color: var(--primary); font-weight: 800; font-size: 18px; }
    .stepper { display: flex; align-items: center; justify-content: space-between; margin-top: 15px; background: #f9f9f9; padding: 8px; border-radius: 30px; }
    .btn-s { width: 50px; height: 50px; border-radius: 50%; border: none; font-size: 24px; font-weight: bold; cursor: pointer; background: #ddd; display: flex; align-items: center; justify-content: center; }
    .btn-s.plus { background: var(--primary); color: white; }
    .btn-s:disabled { opacity: 0.2; cursor: not-allowed; }
    
    .sync-dots:after { content: ' .'; animation: dots 1s steps(5, end) infinite; font-size: 24px; color: var(--accent); }
    @keyframes dots { 0%, 20% { content: ' .'; } 40% { content: ' . .'; } 60% { content: ' . . .'; } 80%, 100% { content: ''; } }

    .market-val { color: var(--primary); font-weight: bold; }
    input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
    .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 5px; transition: all 0.2s; }
    .btn:disabled { opacity: 0.8; cursor: wait; }
    
    #view-scoreboard, #view-admin { max-width: 1000px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
    
    /* Ny layout för Börsen i Scoreboarden */
    .column-split { column-count: 1; column-gap: 30px; }
    @media (min-width: 900px) { .column-split { column-count: 2; } }

    .row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; align-items: center; }
    .btn-mini { padding: 6px 10px; font-size: 11px; border-radius: 4px; border: 1px solid #ddd; background: white; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

<div id="view-loading" class="view" style="display:block; text-align:center; padding-top:100px;">
  <strong>Västervik Climbing</strong><br>Ansluter...
</div>

<div id="view-admin" class="view">
  <div class="card" style="background:var(--danger); color:white; text-align:center;"><h2 style="margin:0">Adminpanel</h2></div>
  <div class="card">
    <h3>Inställningar</h3>
    <div class="grid">
      <div><label>Pott:</label><input type="number" id="adm-pot"></div>
      <div><label>Ref (cm):</label><input type="number" id="adm-ref"></div>
      <div><label>Start:</label><input type="datetime-local" id="adm-start"></div>
      <div><label>Slut:</label><input type="datetime-local" id="adm-end"></div>
    </div>
    <button class="btn" style="background:var(--dark)" id="btn-save-settings" onclick="saveSettings()">Spara</button>
  </div>
  <div class="grid">
    <div class="card"><h3>Problem</h3><input type="text" id="new-p-id" placeholder="ID"><input type="text" id="new-p-name" placeholder="Namn"><button class="btn" id="btn-add-problem" onclick="addProblem()">Lägg till</button><div id="admin-problem-list" style="margin-top:10px"></div></div>
    <div class="card"><h3>Deltagare</h3><div id="admin-user-list"></div><button class="btn" style="background:black; margin-top:20px" id="btn-reset-all" onclick="confirmResetAll()">NOLLSTÄLL ALLT</button></div>
  </div>
</div>

<div id="view-scoreboard" class="view">
  <div id="sb-timer-box" class="timer-banner"></div>
  <div class="grid">
    <div><div class="card" id="sb-list" style="padding:0"></div></div>
    <div><div class="card" id="sb-market" style="padding:0"></div></div>
  </div>
</div>

<div id="view-app" class="view">
  <div id="timer-display" class="timer-banner"></div>
  <div id="header-box"></div>
  <div class="tab-nav">
    <button id="btn-scorecard" class="tab-btn active" onclick="setTab('scorecard')">SCORECARD</button>
    <button id="btn-leaderboard" class="tab-btn" onclick="setTab('leaderboard')">TOPPLISTA</button>
    <button id="btn-market" class="tab-btn" onclick="setTab('market')">BÖRSEN</button>
  </div>
  <div id="list"></div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbxsNal77lmgadq-4qnmN5KzNGDGddm6gOKy7sFR06ax9SrzSe0PkXF1vOpF7TY5bbDuRw/exec";
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');
  const action = urlParams.get('action');
  
  let adminPwd = "", cachedData = null, currentTab = 'scorecard';
  let updateQueue = {}, localSends = {};
  let dataRefreshInterval = null;

  function switchView(id) {
    document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
    const el = document.getElementById('view-' + id);
    if(el) el.style.display = 'block';
  }

  function getProblemScore(pId) {
    if(!cachedData) return 0;
    const myCount = localSends[pId] || 0;
    const pVal = cachedData.problemValues[pId];
    if (myCount === 0 || !pVal || pVal.totalShares <= 0) return 0;
    return ((myCount * cachedData.currentUser.factor) / pVal.totalShares) * cachedData.settings.totalPot;
  }

  async function update(pId, delta) {
    const now = Date.now(), start = new Date(cachedData.settings.startTime).getTime(), grace = new Date(cachedData.settings.endTime).getTime() + 3600000;
    if (now < start || now > grace) { alert("Tävlingen är stängd."); return; }
    if (!localSends[pId]) localSends[pId] = 0;
    localSends[pId] = Math.max(0, localSends[pId] + delta);
    if (!updateQueue[pId]) updateQueue[pId] = [];
    updateQueue[pId].push(delta > 0 ? 'registerSend' : 'removeSend');
    renderApp();
    if (updateQueue[pId].length === 1) processQueue(pId);
  }

  async function processQueue(pId) {
    while (updateQueue[pId].length > 0) {
      const act = updateQueue[pId][0];
      try {
        const res = await fetch(`${API_URL}?token=${token}&action=${act}&pId=${pId}`);
        const newData = await res.json();
        cachedData = newData; 
        updateQueue[pId].shift();
        if (updateQueue[pId].length === 0) await new Promise(r => setTimeout(r, 400));
        renderApp();
      } catch (e) { await new Promise(r => setTimeout(r, 2000)); }
    }
  }

  async function loadData(showLoading) {
    if (Object.values(updateQueue).some(q => q.length > 0)) return;
    if (cachedData && Date.now() > (new Date(cachedData.settings.endTime).getTime() + 3600000)) {
        clearInterval(dataRefreshInterval); return;
    }
    if(showLoading) switchView('loading');
    const params = action === 'scoreboard' ? {action:'scoreboard'} : {action:'getAppData', token:token};
    try {
      const res = await fetch(`${API_URL}?${new URLSearchParams(params)}`);
      cachedData = await res.json();
      action === 'scoreboard' ? renderScoreboard() : renderApp();
      switchView(action === 'scoreboard' ? 'scoreboard' : 'app');
    } catch (e) { console.error(e); }
  }

  function renderApp() {
    const d = cachedData; if (!d || !d.currentUser) return;
    d.problems.forEach(p => {
      if (!(updateQueue[p.id] && updateQueue[p.id].length > 0)) localSends[p.id] = d.userSends[p.id] || 0;
    });
    const myTotal = d.leaderboard.find(u => u.name === d.currentUser.name)?.score || 0;
    document.getElementById('header-box').innerHTML = `<div class="card header-card"><div><small>HCP: ${d.currentUser.factor.toFixed(2)}x</small><br><strong>${d.currentUser.name}</strong></div><div style="text-align:right;"><small>TOTALT</small><br><strong style="font-size:24px; color:#2ecc71;">${Math.round(myTotal).toLocaleString()}</strong></div></div>`;
    const now = Date.now(), start = new Date(d.settings.startTime).getTime(), grace = new Date(d.settings.endTime).getTime() + 3600000;
    const isLocked = now < start || now > grace;
    let html = "";
    if (currentTab === 'scorecard') {
      d.problems.forEach(p => {
        const hasQueue = updateQueue[p.id] && updateQueue[p.id].length > 0;
        const scoreDisplay = hasQueue ? '<span class="sync-dots"></span>' : Math.round(getProblemScore(p.id)).toLocaleString() + ' p';
        html += `<div class="card"><strong>#${p.id} ${p.name}</strong><div class="p-score">${scoreDisplay}</div><div class="stepper"><button class="btn-s" onclick="update('${p.id}',-1)" ${isLocked ? 'disabled':''}>−</button><b style="font-size:28px;">${localSends[p.id] || 0}</b><button class="btn-s plus" onclick="update('${p.id}',1)" ${isLocked ? 'disabled':''}>+</button></div></div>`;
      });
    } else if (currentTab === 'leaderboard') {
      d.leaderboard.forEach((u,i) => { html += `<div class="card" style="display:flex; justify-content:space-between; ${u.name === d.currentUser.name ? 'border:2px solid var(--primary)':''}"><span>${i+1}. ${u.name}</span><strong>${u.score.toLocaleString()} p</strong></div>`; });
    } else {
      d.problems.forEach(p => { html += `<div class="card" style="display:flex; justify-content:space-between;"><span>#${p.id} ${p.name}</span><strong class="market-val">${Math.round(d.settings.totalPot / ((d.problemValues[p.id]?.totalShares || 0) + 1.0)).toLocaleString()} p</strong></div>`; });
    }
    document.getElementById('list').innerHTML = html; refreshTimer();
  }

  function renderScoreboard() {
    const d = cachedData;
    // Topplista 25 rader
    document.getElementById('sb-list').innerHTML = '<h3 class="card" style="background:var(--dark);color:white;margin:0;border-radius:12px 12px 0 0; font-size:14px; padding:15px;">TOPPLISTA (TOP 25)</h3>' + 
      d.leaderboard.slice(0, 25).map((u,i) => `<div class="row"><span>${i+1}. ${u.name}</span><strong>${u.score.toLocaleString()} p</strong></div>`).join('');
    
    // Börsen med kolumnstöd
    document.getElementById('sb-market').innerHTML = '<h3 class="card" style="background:var(--dark);color:white;margin:0;border-radius:12px 12px 0 0; font-size:14px; padding:15px;">BÖRSEN</h3>' + 
      '<div class="column-split" style="padding:10px;">' + 
      d.problems.map(p => `<div class="row"><span>#${p.id} ${p.name}</span><strong class="market-val">${Math.round(d.settings.totalPot / ((d.problemValues[p.id]?.totalShares || 0) + 1.0)).toLocaleString()}</strong></div>`).join('') + 
      '</div>';
    refreshTimer();
  }

  function refreshTimer() {
    if (!cachedData) return;
    const start = new Date(cachedData.settings.startTime).getTime(), end = new Date(cachedData.settings.endTime).getTime(), now = Date.now();
    let label, color, target;
    if (now < start) { target = start - now; label = "STARTAR OM: "; color = "#3498db"; }
    else if (now < end) { target = end - now; label = "KVAR: "; color = (target/60000) > 10 ? "#27ae60" : "#e74c3c"; }
    else { target = (end + 3600000) - now; label = "EFTERREG: "; color = "#9b59b6"; if(target < 0) { label = "AVSLUTAD"; target = 0; } }
    const h = Math.floor(target/3600000), m = Math.floor((target%3600000)/60000), s = Math.floor((target%60000)/1000);
    const str = label + (target > 0 ? `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}` : "");
    document.querySelectorAll('.timer-banner').forEach(el => { el.innerText = str; el.style.background = color; });
  }

  async function loadAdmin() {
    if(!adminPwd) adminPwd = prompt("Lösenord:");
    switchView('loading');
    try {
      const res = await fetch(`${API_URL}?action=getAdminFull&pwd=${adminPwd}`);
      const data = await res.json();
      if(data.error) { alert("Fel!"); location.reload(); return; }
      renderAdmin(data); switchView('admin');
    } catch (e) { alert("Kunde inte ladda"); }
  }

  function renderAdmin(data) {
    document.getElementById('adm-pot').value = data.settings.pot;
    document.getElementById('adm-ref').value = data.settings.refHeight;
    document.getElementById('adm-start').value = new Date(data.settings.start).toISOString().slice(0,16);
    document.getElementById('adm-end').value = new Date(data.settings.end).toISOString().slice(0,16);
    document.getElementById('admin-problem-list').innerHTML = data.problems.map(p => `<div class="row"><span>#${p.id} ${p.name}</span><button class="btn-mini" onclick="deleteProblem(this, '${p.id}')">Radera</button></div>`).join('');
    document.getElementById('admin-user-list').innerHTML = data.users.map(u => `<div class="row"><span>${u.name}</span><button class="btn-mini" onclick="resetUser(this, '${u.id}')">Reset</button></div>`).join('');
  }

  async function adminAction(params, btn, loadingText) {
    const originalText = btn.innerText; btn.innerText = loadingText; btn.disabled = true;
    try {
      const res = await fetch(`${API_URL}?pwd=${adminPwd}&${new URLSearchParams(params)}`);
      const data = await res.json(); btn.innerText = "Klart!"; renderAdmin(data);
      setTimeout(() => { btn.innerText = originalText; btn.disabled = false; }, 800);
    } catch (e) { alert("Fel vid sparning"); btn.innerText = originalText; btn.disabled = false; }
  }

  async function saveSettings() { adminAction({ action: 'updateSettings', pot: document.getElementById('adm-pot').value, refHeight: document.getElementById('adm-ref').value, start: document.getElementById('adm-start').value, end: document.getElementById('adm-end').value }, document.getElementById('btn-save-settings'), "Sparar..."); }
  async function addProblem() { adminAction({ action: 'addProblem', pId: document.getElementById('new-p-id').value, name: document.getElementById('new-p-name').value }, document.getElementById('btn-add-problem'), "Lägger till..."); }
  async function deleteProblem(btn, id) { if(confirm("Radera?")) adminAction({ action: 'deleteProblem', pId: id }, btn, "Raderar..."); }
  async function resetUser(btn, id) { if(confirm("Nollställ?")) adminAction({ action: 'resetUser', userId: id }, btn, "Nollställer..."); }
  async function confirmResetAll() { if(confirm("NOLLSTÄLL ALLT?")) adminAction({ action: 'resetEverything' }, document.getElementById('btn-reset-all'), "Raderar allt..."); }

  function setTab(t) { currentTab = t; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+t).classList.add('active'); renderApp(); }

  window.onload = () => {
    if (action === 'admin') loadAdmin();
    else if (action === 'scoreboard' || token) { 
        loadData(true); 
        setInterval(refreshTimer, 1000);
        dataRefreshInterval = setInterval(() => { if (!document.hidden) loadData(false); }, 60000);
    } else { document.getElementById('view-loading').innerText = "Länk saknas."; }
  };
</script>
</body>
</html>
