<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Miljontävlingen</title>
  <style>
    body { font-family: sans-serif; margin: 0; background: #f4f7f6; padding: 15px; }
    .view { display: none; max-width: 500px; margin: 0 auto; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
    input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
    button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

<div id="view-loading" class="view" style="display:block; text-align:center;">Laddar...</div>

<div id="view-auth" class="view">
  <div class="card">
    <h2>Logga in</h2>
    <input type="text" id="reg-name" placeholder="Namn">
    <input type="email" id="reg-email" placeholder="E-post">
    <input type="number" id="reg-length" placeholder="Längd (cm)">
    <button onclick="handleAuth()">Skicka länk</button>
  </div>
</div>

<div id="view-app" class="view">
  <div id="content"></div>
</div>

<script>
  // 1. Inställningar
  const API_URL = "https://script.google.com/macros/s/DIN_URL_HÄR/exec";
  
  // Fånga token oavsett om den kommer från Google (server-side) eller URL (client-side)
  let currentToken = "<?= typeof token !== 'undefined' ? token : '' ?>"; 
  if (!currentToken) {
    currentToken = new URLSearchParams(window.location.search).get('token');
  }

  window.onload = () => {
    if (currentToken) {
      fetchData();
    } else {
      switchView('auth');
    }
  };

  async function fetchData() {
    // Om vi kör på Google Script direkt (i en iframe/direktlänk)
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      google.script.run
        .withSuccessHandler(data => { renderApp(data); switchView('app'); })
        .getAppData(currentToken);
    } 
    // Om vi kör på GitHub (via API)
    else {
      const res = await fetch(`${API_URL}?action=getAppData&token=${currentToken}`);
      const data = await res.json();
      renderApp(data);
      switchView('app');
    }
  }

  async function handleAuth() {
    const n = document.getElementById('reg-name').value;
    const e = document.getElementById('reg-email').value;
    const l = document.getElementById('reg-length').value;
    
    // Samma här: Kolla om vi kör via Google eller Fetch
    if (typeof google !== 'undefined' && google.script) {
      google.script.run.withSuccessHandler(() => alert("Kolla mejlen!")).requestLogin(e, n, l);
    } else {
      await fetch(`${API_URL}?action=requestLogin&email=${e}&name=${n}&length=${l}`);
      alert("Kolla mejlen!");
    }
  }

  function renderApp(data) {
    if (data.error) return switchView('auth');
    document.getElementById('content').innerHTML = `<h1>Hej ${data.currentUser.name}</h1>`;
  }

  function switchView(id) {
    document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
    document.getElementById('view-' + id).style.display = 'block';
  }
</script>
</body>
</html>
